<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DDC Scanner v1.28</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f7;
            --purple-accent: #6c5ce7;
            --ok-blue: #3498db;
            --ng-red: #e74c3c;
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; font-family: sans-serif; }
        
        /* ヘッダー */
        .top-id-bar { height: 70px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-weight: 900; z-index: 100; }
        .course-title { font-size: 32px; flex-grow: 1; text-align: center; }

        /* メイン */
        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 5px; }
        .line-name { font-size: 28px; font-weight: 900; color: #000; height: 2.2em; display: flex; align-items: center; justify-content: center; width: 95%; }
        .line-code { font-size: 50px; color: var(--purple-accent); font-family: monospace; font-weight: 900; letter-spacing: 5px; }
        #scan-step-label { font-size: 18px; font-weight: bold; color: #666; margin-bottom: 5px; background: #e0e0eb; padding: 4px 20px; border-radius: 12px; }
        
        /* カメラ */
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; background: #000; box-shadow: var(--inner); position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 80px; border: 4px solid var(--purple-accent); border-radius: 12px; pointer-events: none; }
        .guide-rect.step2 { border-color: #ff9f43; }

        /* 設定・履歴画面 */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: none; flex-direction: column; padding: 20px; }
        .setup-controls { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; flex-shrink: 0; }
        .list-container { flex-grow: 1; overflow-y: auto; background: #fff; border-radius: 15px; padding: 0; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; }
        .list-item:active { background: #eee; }
        .list-item.done { color: #2ecc71; background: #fafffa; }

        /* フッター */
        .footer { height: 32vh; display: flex; align-items: center; justify-content: space-evenly; }
        .btn-side { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 40px; }
        #scan-main { width: 145px; height: 145px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 24px; font-weight: 900; }
        #scan-main.ready { background: var(--bg); color: var(--purple-accent); }
        #scan-main.active { background: var(--purple-accent); color: #fff; box-shadow: var(--inner); }

        /* ポップアップ */
        #custom-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup-card { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        
        #symbol-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 240px; font-weight: bold; pointer-events: none; z-index: 5000; opacity: 0; }
        .animate-symbol { animation: popStop 1.3s ease-in-out forwards; }
        @keyframes popStop { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 85%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.8)} }
    </style>
</head>
<body>
    <div id="custom-popup"><div class="popup-card"><h3 id="popup-title">詳細</h3><div id="popup-text" style="margin:20px 0; text-align:left; white-space:pre-wrap; font-size:20px; line-height:1.6;"></div><button onclick="playSound('tap'); closePopup();" style="width:100%; padding:15px; background:var(--purple-accent); color:#fff; border:none; border-radius:10px; font-weight:bold; font-size:18px;">閉じる</button></div></div>
    <div id="setup-screen">
        <div class="setup-controls">
            <select id="shift-in" onchange="playSound('tap'); updateCourseOptions();" style="width:100%; padding:15px; font-size:20px; margin-bottom:10px; border-radius:10px;"><option value="1">1便</option><option value="2">2便</option><option value="3">3便</option></select>
            <select id="course-in" onchange="playSound('tap');" style="width:100%; padding:15px; font-size:20px; margin-bottom:10px; border-radius:10px;"></select>
            <button onclick="applySettings();" style="width:100%; height:60px; background:var(--purple-accent); color:#fff; border:none; border-radius:12px; font-size:20px; font-weight:bold;">設定を確定</button>
        </div>
        <div class="list-container" id="delivery-list-ui"></div>
        <button onclick="playSound('tap'); document.getElementById('setup-screen').style.display='none';" style="margin-top:10px; width:100%; padding:20px; background:#666; color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:18px;">戻る</button>
    </div>
    <div id="symbol-overlay"></div>
    <div class="top-id-bar"><button style="background:none; border:none; color:white; font-size:35px; padding:10px;" onclick="playSound('tap'); openSetup();">⚙</button><div class="course-title" id="top-id-display">DDC SCANNER</div><div style="width:50px;"></div></div>
    <div class="header">
        <div id="scan-step-label">STEP 1: 台車看板スキャン</div>
        <div id="name-label" class="line-name">LOADING...</div>
        <div id="code-label" class="line-code">000000</div>
    </div>
    <div id="cam-area"><div class="cam-frame"><video id="video" autoplay playsinline muted></video><div id="guide" class="guide-rect"></div></div></div>
    <div class="footer"><button class="btn-side" onclick="playSound('tap'); stepShop(-1);">◀</button><button id="scan-main" disabled onclick="toggleAutoScan()">待機中</button><button class="btn-side" onclick="playSound('tap'); stepShop(1);">▶</button></div>

    <script>
        let db = {}; const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkGW07X71K4ABtBqX4HI4mbH4D9fChVkM8eoBVpvlyG5Ga_7a6vL6o6Q1zIOpJBFOZ-P--mBMbAvto/pub?gid=0&single=true&output=csv";
        let myCourse = localStorage.getItem('v41_course_id') || "";
        let idx = parseInt(localStorage.getItem('v128_idx')) || 0;
        let scanStep = 1;
        let historyData = JSON.parse(localStorage.getItem('v41_hist_data') || '[]');
        let worker = null, isAutoScan = false, audioCtx = null, lastCheckTime = 0;

        function saveHistory() { localStorage.setItem('v41_hist_data', JSON.stringify(historyData)); localStorage.setItem('v41_course_id', myCourse); localStorage.setItem('v128_idx', idx); }
        function ensureCycle() { let c = historyData[0]; if (!c || c.isFinalized) { c = { id: Date.now(), course: myCourse, shops: {}, completedCodes: [], isFinalized: false }; historyData.unshift(c); if(historyData.length > 3) historyData.pop(); } return c; }
        function showPopup(t, txt) { document.getElementById('popup-title').innerText = t; document.getElementById('popup-text').innerText = txt; document.getElementById('custom-popup').style.display = "flex"; }
        function closePopup() { document.getElementById('custom-popup').style.display = "none"; }
        function playSound(type) { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); const now = audioCtx.currentTime; const g = audioCtx.createGain(); g.connect(audioCtx.destination); const o = audioCtx.createOscillator(); o.connect(g); if(type==='ok'){ o.frequency.setValueAtTime(659, now); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.5); o.start(); o.stop(now+0.5); } else if(type==='tap'){ o.frequency.setValueAtTime(880, now); g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.1); o.start(); o.stop(now+0.1); } else { o.type='sawtooth'; o.frequency.setValueAtTime(130, now); g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0, now+0.4); o.start(); o.stop(now+0.4); } }

        async function loadDataFromSheet() { try { const res = await fetch(SHEET_URL); const csv = await res.text(); const lines = csv.split("\n"); for(let i=1; i<lines.length; i++){ const r = lines[i].split(","); if(r.length<3) continue; const c=r[0].trim(); if(!db[c]) db[c]=[]; db[c].push({n:r[1].trim(), c:r[2].trim().replace(/"/g,"")}); } if(!myCourse || !db[myCourse]) myCourse = Object.keys(db)[0]; updateCourseOptions(); ui(); initAI(); } catch(e){ document.getElementById('name-label').innerText="通信エラー"; } }
        function updateCourseOptions() { const s = document.getElementById('shift-in').value; const m = document.getElementById('course-in'); m.innerHTML=""; Object.keys(db).sort().filter(c=>c.startsWith(s)).forEach(c=>{ let o=document.createElement("option"); o.value=c; o.text=c+"コース"; m.add(o); if(c==myCourse) o.selected=true; }); }
        function openSetup() { document.getElementById('setup-screen').style.display="flex"; renderList(); }
        function renderList() { 
            const container = document.getElementById('delivery-list-ui'); container.innerHTML=""; 
            const entry = historyData[0]; if(!entry) return;
            (db[entry.course]||[]).forEach((s,i)=>{
                const times = entry.shops[s.c] || []; const done = entry.completedCodes.includes(s.c);
                const div = document.createElement('div'); div.className=`list-item ${done?'done':''}`;
                div.innerHTML=`<span>${done?'✔':'-'} ${i+1}. ${s.n}</span><span>${times.length||'-'}台</span>`;
                div.onclick = () => { playSound('tap'); if(times.length > 0) showPopup(s.n, "納品時刻:\n" + times.map(t=>"・"+t).join("\n")); };
                container.appendChild(div);
            });
        }
        function applySettings() { 
            playSound('tap'); 
            myCourse = document.getElementById('course-in').value; 
            idx=0; 
            scanStep=1; 
            ensureCycle(); // サイクルを強制作成・更新
            saveHistory(); 
            renderList(); // リストを最新コースの内容で即時描画
            document.getElementById('setup-screen').style.display='flex'; // 確定後も画面を維持（または開き直す）
            ui(); 
        }
        async function initAI() { const btn = document.getElementById('scan-main'); worker = await Tesseract.createWorker(); await worker.loadLanguage('eng'); await worker.initialize('eng'); await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' }); btn.disabled=false; btn.innerText="AUTO SCAN"; btn.classList.add('ready'); }
        function ui() { if(!db[myCourse]) return; const itm = db[myCourse][idx]; document.getElementById('top-id-display').innerText = `${myCourse} - ${idx+1}`; document.getElementById('code-label').innerText = itm.c; document.getElementById('name-label').innerText = itm.n; const lbl = document.getElementById('scan-step-label'); const gd = document.getElementById('guide'); if(scanStep===1){ lbl.innerText="STEP 1: 台車看板スキャン"; lbl.style.color="var(--purple-accent)"; gd.classList.remove('step2'); } else { lbl.innerText="STEP 2: ラベルスキャン"; lbl.style.color="#ff9f43"; gd.classList.add('step2'); } }
        function stepShop(d) { const list = db[myCourse]; const c = ensureCycle(); const curS = myCourse.substring(0,1); if(d===1){ const shopC = list[idx].c; if((c.shops[shopC]||[]).length > 0 && !c.completedCodes.includes(shopC)) c.completedCodes.push(shopC); if(idx === list.length-1){ showPopup(`${curS}便 終了`, `全店舗のスキャンが完了しました。`); } } idx = Math.max(0, Math.min(list.length-1, idx+d)); scanStep=1; saveHistory(); ui(); }
        function toggleAutoScan() { playSound('tap'); isAutoScan = !isAutoScan; const btn = document.getElementById('scan-main'); if(isAutoScan){ btn.innerText="STOP"; btn.classList.add('active'); runScannerLoop(); } else { btn.innerText="AUTO SCAN"; btn.classList.remove('active'); } }
        async function runScannerLoop() { if(!isAutoScan) return; const v = document.getElementById('video'); const canvas = document.createElement('canvas'); canvas.width=180; canvas.height=80; const ctx = canvas.getContext('2d'); ctx.drawImage(v, (v.videoWidth-600)/2, (v.videoHeight-260)/2, 600, 260, 0, 0, 180, 80); try { const res = await worker.recognize(canvas); const txt = res.data.text.replace(/[^0-9]/g, ''); if(txt.length >= 6) checkMatch(txt); } catch(e){} if(isAutoScan) setTimeout(runScannerLoop, 300); }
        function checkMatch(input) { const now = Date.now(); if(now-lastCheckTime < 1800) return; const target = db[myCourse][idx].c; if(!input.includes(target)){ if(input.length===6){ lastCheckTime=now; showVisual(false); playSound('ng'); } return; } lastCheckTime=now; const c = ensureCycle(); if(scanStep===1){ scanStep=2; playSound('ok'); ui(); } else { if(!c.shops[target]) c.shops[target]=[]; c.shops[target].push(new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})); showVisual(true); playSound('ok'); scanStep=1; saveHistory(); ui(); toggleAutoScan(); } }
        function showVisual(ok) { const o = document.getElementById('symbol-overlay'); o.innerText = ok ? "○" : "×"; o.style.color = ok ? "var(--ok-blue)" : "var(--ng-red)"; o.classList.remove('animate-symbol'); void o.offsetWidth; o.classList.add('animate-symbol'); }
        async function cam() { const v = document.getElementById('video'); try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:{ideal:1280}}}); v.srcObject=s; } catch(e){ alert("カメラ起動失敗"); } }
        window.onload = () => { loadDataFromSheet(); cam(); };
    </script>
</body>
</html>

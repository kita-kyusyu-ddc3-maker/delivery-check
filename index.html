<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner VIOLET v38</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f7;
            --purple-accent: #6c5ce7;
            --cyan: #008a8a;
            --red: #d63031;
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 帯 */
        .top-id-bar { height: 70px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .settings-btn { background: none; border: none; color: white; font-size: 35px; padding: 10px; cursor: pointer; }
        .course-title { font-size: 38px; flex-grow: 1; text-align: center; margin-right: 45px; }

        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; text-align: center; }
        .line-name { font-size: 32px; font-weight: 900; color: #000; line-height: 1.1; height: 2.2em; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 95%; }
        .line-code { font-size: 55px; color: var(--purple-accent); font-family: monospace; font-weight: 900; letter-spacing: 5px; }
        .line-result { font-size: 26px; font-weight: 900; height: 1.2em; color: #888; }

        /* カメラとガイド枠（★幅をスリムに修正） */
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; box-shadow: var(--inner); background: #000; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 160px; /* ← 横幅をギュッと狭くしました */
            height: 70px; 
            border: 3px solid var(--purple-accent); 
            border-radius: 12px; 
            z-index: 500; cursor: pointer; 
        }

        /* 手入力モーダル（小型） */
        #manual-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .manual-card { background: #fff; padding: 20px; border-radius: 20px; width: 280px; text-align: center; }
        #manual-input { width: 100%; padding: 10px; font-size: 36px; text-align: center; border-radius: 10px; border: 2px solid var(--purple-accent); margin-bottom: 15px; outline: none; }

        .footer { height: 35vh; display: flex; align-items: center; justify-content: space-evenly; padding: 0 10px 20px; }
        .btn-side { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 45px; display: flex; align-items: center; justify-content: center; }
        #scan-main { width: 155px; height: 155px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 22px; font-weight: 900; }
        #scan-main.ready { background: var(--bg); color: var(--purple-accent); font-size: 34px; }

        /* 設定画面 */
        #setup-screen { position: fixed; inset: 0; background: #f0f0f7; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        select { width: 100%; padding: 15px; font-size: 24px; margin: 10px 0 20px; border: 2px solid #ddd; border-radius: 10px; background: #fff; color: #000; outline: none; }
        #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; }
        .match { background: radial-gradient(circle, rgba(0,138,138,0.4) 0%, transparent 70%); }
        .mismatch { background: radial-gradient(circle, rgba(214,48,49,0.4) 0%, transparent 70%); }
    </style>
</head>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="text-align: center; margin-bottom: 20px;">配送設定</h2>
            <p style="font-weight: bold; color: #666;">1. 便を選択</p>
            <select id="shift-in" onchange="updateCourseOptions()">
                <option value="1">1便</option>
                <option value="2">2便</option>
                <option value="3">3便</option>
            </select>
            <p style="font-weight: bold; color: #666;">2. コースを選択</p>
            <select id="course-in"></select>
            <button style="width: 100%; height: 65px; background: #6c5ce7; color: white; border: none; border-radius: 12px; font-size: 26px; font-weight: bold;" onclick="applySettings()">設定を確定</button>
        </div>
    </div>

    <div id="manual-box">
        <div class="manual-card">
            <p style="margin-bottom: 10px; font-weight: bold; font-size: 20px;">直接入力</p>
            <input type="tel" id="manual-input" maxlength="6" placeholder="000000">
            <button style="width: 100%; padding: 12px; background: #999; color: #fff; border: none; border-radius: 8px; font-size: 18px;" onclick="closeManual()">戻る</button>
        </div>
    </div>

    <div id="flash"></div>
    <div class="top-id-bar">
        <button class="settings-btn" onclick="openSetup()">⚙</button>
        <div id="top-id-display" class="course-title">--- - --</div>
    </div>

    <div class="header">
        <div id="name-label" class="line-name">店舗名</div>
        <div id="code-label" class="line-code">000000</div>
        <div id="res-label" class="line-result">READY</div>
    </div>

    <div id="cam-area">
        <div class="cam-frame">
            <video id="video" autoplay playsinline muted></video>
            <div class="guide-rect" onclick="openManual()"></div>
        </div>
    </div>
    
    <div class="footer">
        <button class="btn-side" onclick="stepShop(-1)">◀</button>
        <button id="scan-main" disabled onclick="handleScanButton()">待機中</button>
        <button class="btn-side" onclick="stepShop(1)">▶</button>
    </div>

        let myCourse = localStorage.getItem('v38_course') || 101;
        let idx = 0;
        let audioCtx = null;
        let worker = null;

        function updateCourseOptions() {
            const shift = document.getElementById('shift-in').value;
            const menu = document.getElementById('course-in');
            menu.innerHTML = "";
            let start, end;
            if(shift == "1") { start = 101; end = 134; }
            else if(shift == "2") { start = 201; end = 234; }
            else { start = 301; end = 301; }
            for(let i=start; i<=end; i++) {
                if(db[i]) {
                    let o = document.createElement("option");
                    o.value = i; o.text = i + " コース";
                    menu.add(o);
                    if(i == myCourse) o.selected = true;
                }
            }
        }

        function openSetup() { document.getElementById('setup-screen').style.display = "flex"; updateCourseOptions(); }

        async function applySettings() {
            myCourse = document.getElementById('course-in').value;
            localStorage.setItem('v38_course', myCourse);
            document.getElementById('setup-screen').style.display = "none";
            idx = 0;
            ui();
            initAudio();
            if(!worker) initAI();
        }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        async function initAI() {
            const btn = document.getElementById('scan-main');
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
            btn.disabled = false;
            btn.innerText = "SCAN";
            btn.classList.add('ready');
        }

        function playSound(type) {
            if(!audioCtx) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); g.connect(audioCtx.destination);
            const o = audioCtx.createOscillator(); o.connect(g);
            if(type === 'ok') { o.frequency.setValueAtTime(880, now); g.gain.setValueAtTime(0.1, now); o.start(); o.stop(now+0.2); }
            else if(type === 'ng') { o.type = 'sawtooth'; o.frequency.setValueAtTime(100, now); g.gain.setValueAtTime(0.15, now); o.start(); o.stop(now+0.4); }
            else { o.frequency.setValueAtTime(1200, now); g.gain.setValueAtTime(0.05, now); o.start(); o.stop(now+0.05); }
        }

        function ui() {
            if(!db[myCourse]) return;
            const item = db[myCourse][idx];
            document.getElementById('top-id-display').innerText = `${myCourse} - ${String(idx + 1).padStart(2, '0')}`;
            document.getElementById('code-label').innerText = item.c;
            document.getElementById('name-label').innerText = item.n;
        }

        function stepShop(d) {
            const list = db[myCourse];
            idx = Math.max(0, Math.min(list.length - 1, idx + d));
            ui();
        }

        async function cam() {
            const v = document.getElementById('video');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                v.srcObject = s;
            } catch(e) { alert("カメラを許可してください"); }
        }

        function openManual() {
            initAudio();
            document.getElementById('manual-box').style.display = "flex";
            const input = document.getElementById('manual-input');
            input.value = "";
            setTimeout(() => input.focus(), 300);
        }
        function closeManual() { document.getElementById('manual-box').style.display = "none"; }
        
        document.getElementById('manual-input').addEventListener('input', function(e){
            if(this.value.length === 6) { checkResult(this.value); setTimeout(closeManual, 500); }
        });

        function handleScanButton() { playSound('start'); runScanner(); }

        async function runScanner() {
            const btn = document.getElementById('scan-main');
            btn.disabled = true;
            const v = document.getElementById('video');
            
            // 【重要】スリム枠の中身だけをAIに渡す処理
            const canvas = document.createElement('canvas');
            const scale = v.videoWidth / v.clientWidth;
            // 紫枠のサイズ (160x70) に合わせて切り抜き
            canvas.width = 160; canvas.height = 70;
            const sx = (v.videoWidth - 160 * scale) / 2;
            const sy = (v.videoHeight - 70 * scale) / 2;
            canvas.getContext('2d').drawImage(v, sx, sy, 160 * scale, 70 * scale, 0, 0, 160, 70);

            try {
                const res = await Promise.race([worker.recognize(canvas), new Promise((_,r)=>setTimeout(()=>r(),3500))]);
                checkResult(res.data.text.replace(/[^0-9]/g, ''));
            } catch(e) { checkResult("??????"); }
            btn.disabled = false;
        }

        function checkResult(input) {
            const item = db[myCourse][idx];
            const flash = document.getElementById('flash');
            const resL = document.getElementById('res-label');
            if(input.includes(item.c)) { 
                playSound('ok'); flash.className="match"; resL.innerText = "OK: " + item.c;
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else { 
                playSound('ng'); flash.className="mismatch"; resL.innerText = "NG: " + (input.slice(0,6) || "??????");
                if(navigator.vibrate) navigator.vibrate(400);
            }
            flash.style.opacity = 1;
            setTimeout(()=> flash.style.opacity=0, 800);
        }

        window.onload = () => { genData(); updateCourseOptions(); cam(); };
    </script>

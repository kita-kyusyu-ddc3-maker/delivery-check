<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner VIOLET v45 - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            /* 高級感のあるダークテーマ設定 */
            --bg-dark: #0a0a12;
            --card-bg: #161625;
            --purple-neon: #a29bfe;
            --purple-main: #6c5ce7;
            --ok-cyan: #00d2ff;
            --ng-rose: #ff7675;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --shadow-soft: 0 8px 32px rgba(0,0,0,0.5);
            --border-glass: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* 上部バー */
        .top-id-bar { 
            height: 60px; 
            background: linear-gradient(90deg, #1e1e30, #2d3436);
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 1px solid var(--border-glass);
            z-index: 100;
        }
        .settings-btn { background: none; border: none; color: var(--purple-neon); font-size: 28px; cursor: pointer; }
        .course-title { font-size: 22px; font-weight: bold; letter-spacing: 1px; color: var(--purple-neon); }

        /* メイン表示エリア */
        .header { 
            flex: 0.7; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; padding: 10px; text-align: center;
        }
        .line-name { 
            font-size: 28px; font-weight: 800; color: #fff; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 5px; height: 1.2em; overflow: hidden;
        }
        .line-code { 
            font-size: 52px; color: var(--ok-cyan); 
            font-family: 'Courier New', monospace; font-weight: 900; letter-spacing: 6px; 
        }

        /* カウント表示 */
        .delivery-counter {
            background: var(--card-bg);
            padding: 4px 18px; border-radius: 50px;
            font-size: 16px; color: var(--text-dim);
            margin-top: 5px; border: 1px solid var(--border-glass);
        }
        .delivery-counter b { color: var(--purple-neon); font-size: 20px; }

        /* カメラエリア */
        #cam-area { height: 22vh; width: 100%; padding: 0 30px; position: relative; }
        .cam-frame { 
            width: 100%; height: 100%; border-radius: 20px; overflow: hidden; 
            border: 2px solid var(--border-glass); position: relative; 
            box-shadow: var(--shadow-soft); background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 180px; height: 80px; border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 10px; pointer-events: none; z-index: 10;
        }
        .guide-rect.scanning { border-color: var(--purple-neon); box-shadow: 0 0 20px var(--purple-main); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 履歴リスト（スクロール可能） */
        .history-container {
            flex: 1.2; width: 90%; margin: 10px auto; overflow-y: auto;
            background: rgba(255,255,255,0.03); border-radius: 15px;
            padding: 10px; border: 1px solid var(--border-glass);
        }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 14px;
        }
        .hist-count { color: var(--purple-neon); font-weight: bold; width: 60px; }
        .hist-time { color: var(--text-dim); font-family: monospace; }

        /* フッター */
        .footer { 
            height: 22vh; display: flex; align-items: center; justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .btn-side { 
            width: 70px; height: 70px; border-radius: 20px; border: 1px solid var(--border-glass);
            background: var(--card-bg); color: #fff; font-size: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); outline: none;
        }
        #scan-main { 
            width: 130px; height: 130px; border-radius: 50%; border: none; 
            background: linear-gradient(135deg, var(--purple-main), #4834d4);
            color: #fff; font-size: 20px; font-weight: bold;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.4);
            transition: 0.2s; outline: none;
        }
        #scan-main.active { filter: hue-rotate(90deg); transform: scale(0.95); box-shadow: 0 0 40px var(--ok-cyan); }
        #scan-main:disabled { background: #333; box-shadow: none; color: #666; }

        /* 判定アニメーション */
        #symbol-overlay { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 250px; pointer-events: none; z-index: 5000; opacity: 0; }
        .animate-symbol { animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 0%) scale(0.5); } 40% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -100%) scale(1); } }

        /* 設定画面 */
        #setup-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .setup-card { background: var(--card-bg); padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border-glass); text-align: center; }
        select { width: 100%; padding: 18px; font-size: 22px; margin: 15px 0; background: #000; color: #fff; border: 1px solid var(--purple-main); border-radius: 15px; outline: none; }
    </style>
</head>

        let myCourse = localStorage.getItem('v45_course_id') || 101;
        let idx = 0;
        let audioCtx = null;
        let worker = null;
        let isAutoScan = false;
        let scanHistory = JSON.parse(localStorage.getItem('v45_history') || '[]');

        function updateCourseOptions() {
            const shift = document.getElementById('shift-in').value;
            const menu = document.getElementById('course-in');
            menu.innerHTML = "";
            let start, end;
            if(shift == "1") { start = 101; end = 134; }
            else if(shift == "2") { start = 201; end = 234; }
            else { start = 301; end = 301; }
            for(let i=start; i<=end; i++) {
                if(db[i]) {
                    let o = document.createElement("option");
                    o.value = i; o.text = i + "コース";
                    menu.add(o);
                    if(i == myCourse) o.selected = true;
                }
            }
        }

        function openSetup() { 
            document.getElementById('setup-screen').style.display = "flex"; 
            updateCourseOptions(); 
        }

        async function applySettings() {
            myCourse = document.getElementById('course-in').value;
            localStorage.setItem('v45_course_id', myCourse);
            document.getElementById('setup-screen').style.display = "none";
            idx = 0;
            ui();
            if(!worker) initAI();
        }

        async function initAI() {
            const btn = document.getElementById('scan-main');
            btn.innerText = "INITIALIZING...";
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ 
                tessedit_char_whitelist: '0123456789',
                tessedit_pageseg_mode: '7'
            });
            btn.disabled = false;
            btn.innerText = "AUTO SCAN";
        }

        function playSound(type) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); g.connect(audioCtx.destination);
            const o = audioCtx.createOscillator(); o.connect(g);
            if(type === 'ok') {
                o.frequency.setValueAtTime(880, now);
                o.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.3);
            } else {
                o.frequency.setValueAtTime(180, now);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.4);
            }
            o.start(); o.stop(now + 0.4);
        }

        function ui() {
            if(!db[myCourse]) return;
            const item = db[myCourse][idx];
            document.getElementById('top-id-display').innerText = `${myCourse} - ${String(idx + 1).padStart(2, '0')}`;
            document.getElementById('code-label').innerText = item.c;
            document.getElementById('name-label').innerText = item.n;
            
            // 現在の店舗の履歴を取得
            const myHistory = scanHistory.filter(h => h.code === item.c);
            document.getElementById('count-label').innerText = myHistory.length;
            
            // 履歴リストの更新
            const listEl = document.getElementById('history-list');
            if(myHistory.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; padding-top:20px; color:var(--text-dim);">NO SCAN DATA</div>';
            } else {
                listEl.innerHTML = '';
                [...myHistory].reverse().forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<span class="hist-count">台車 ${h.count}</span><span class="hist-time">${h.time}</span>`;
                    listEl.appendChild(div);
                });
            }
        }

        function stepShop(d) {
            const list = db[myCourse];
            idx = Math.max(0, Math.min(list.length - 1, idx + d));
            ui();
        }

        async function cam() {
            const v = document.getElementById('video');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                v.srcObject = s;
            } catch(e) { alert("カメラの使用を許可してください"); }
        }

        function toggleAutoScan() {
            isAutoScan = !isAutoScan;
            const btn = document.getElementById('scan-main');
            const guide = document.getElementById('guide');
            if(isAutoScan) {
                btn.innerText = "STOP";
                btn.classList.add('active');
                guide.classList.add('scanning');
                runScannerLoop();
            } else {
                btn.innerText = "AUTO SCAN";
                btn.classList.remove('active');
                guide.classList.remove('scanning');
            }
        }

        async function runScannerLoop() {
            if(!isAutoScan) return;
            await runOCR();
            setTimeout(runScannerLoop, 300); 
        }

        async function runOCR() {
            const v = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const scale = v.videoWidth / v.clientWidth;
            canvas.width = 200; canvas.height = 100;
            const sx = (v.videoWidth - 200 * scale) / 2;
            const sy = (v.videoHeight - 100 * scale) / 2;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(v, sx, sy, 200 * scale, 100 * scale, 0, 0, 200, 100);

            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                let gray = data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11;
                let val = (gray > 125) ? 255 : 0; 
                data[i] = data[i + 1] = data[i + 2] = val;
            }
            ctx.putImageData(imageData, 0, 0);

            try {
                const res = await worker.recognize(canvas);
                const txt = res.data.text.replace(/[^0-9]/g, '');
                if(txt.length >= 6) checkResult(txt);
            } catch(e) {}
        }

        let lastCheckTime = 0;
        function checkResult(input) {
            const now = Date.now();
            if(now - lastCheckTime < 2500) return; // 連続検知防止

            const item = db[myCourse][idx];
            if(input.includes(item.c)) {
                lastCheckTime = now;
                playSound('ok');
                showVisual(true);
                
                // 履歴データの作成
                const timeStr = new Date().toLocaleTimeString('ja-JP', {
                    hour:'2-digit', minute:'2-digit', second:'2-digit'
                });
                const currentCount = scanHistory.filter(h => h.code === item.c).length + 1;
                
                scanHistory.push({ 
                    code: item.c, 
                    name: item.n, 
                    time: timeStr, 
                    count: currentCount 
                });
                
                // 保存と表示更新
                localStorage.setItem('v45_history', JSON.stringify(scanHistory));
                ui(); 

                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else if(input.length === 6) {
                // 6桁ピッタリで間違っている場合のみNG
                lastCheckTime = now;
                playSound('ng');
                showVisual(false);
                if(navigator.vibrate) navigator.vibrate(400);
            }
        }

        function showVisual(isOk) {
            const overlay = document.getElementById('symbol-overlay');
            overlay.innerText = isOk ? "○" : "×";
            overlay.style.color = isOk ? "var(--ok-cyan)" : "var(--ng-rose)";
            overlay.classList.remove('animate-symbol');
            void overlay.offsetWidth;
            overlay.classList.add('animate-symbol');
        }

        window.onload = () => { 
            genData(); 
            updateCourseOptions(); 
            cam(); 
            ui(); 
        };
    </script>

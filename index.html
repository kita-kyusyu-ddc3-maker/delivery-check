<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR v3</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* カメラ映像エリア（上部） */
        #video-container { position: relative; width: 100%; flex: 1; background: #222; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 読み取りガイド枠（中央に細長く） */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .guide-box {
            width: 260px; height: 60px; /* メインの数字に合わせるサイズ */
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0,255,0,0.8);
            background: rgba(255,255,255,0.05);
        }

        /* 下部操作パネル（被らないように独立） */
        .control-panel {
            background: #111; padding: 20px; border-top: 2px solid #333;
            display: flex; flex-direction: column; align-items: center;
        }
        .target-info { font-size: 14px; color: #888; margin-bottom: 8px; }
        .target-info strong { color: #00ff00; font-size: 20px; }
        #result { font-size: 18px; font-weight: bold; color: #ffff00; margin-bottom: 20px; text-align: center; min-height: 24px; }
        
        #start-btn {
            width: 90%; max-width: 300px; height: 65px; 
            background: #0088ff; color: white; border: none; border-radius: 15px; 
            font-size: 22px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #0055aa;
        }
        #start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0055aa; }
        #start-btn:disabled { background: #444; box-shadow: none; color: #888; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay">
            <div class="guide-box"></div>
        </div>
    </div>
    
    <div class="control-panel">
        <div class="target-info">ターゲット: <strong>123456</strong></div>
        <div id="result">準備中...</div>
        <button id="start-btn" disabled>スキャン開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result');
        const startBtn = document.getElementById('start-btn');
        const targetCode = "123456"; 

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    resultDisplay.innerText = "枠をメインの数字に合わせて！";
                    startBtn.disabled = false;
                };
            } catch (err) {
                resultDisplay.innerText = "カメラ起動失敗";
            }
        }

        async function recognize() {
            startBtn.disabled = true;
            resultDisplay.innerText = "解析中...";
            document.body.style.backgroundColor = "black";

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            // 映像からガイド枠の部分だけを厳密に切り出す
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            const scanW = videoW * 0.5; // 少し狭めて周囲のノイズをカット
            const scanH = videoH * 0.12; 
            const startX = (videoW - scanW) / 2;
            const startY = (videoH - scanH) / 2;

            canvas.width = scanW;
            canvas.height = scanH;
            context.drawImage(video, startX, startY, scanW, scanH, 0, 0, scanW, scanH);

            try {
                const result = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789' // 数字のみ認識
                });

                // 読み取った文字列から数字以外を完全に排除
                let text = result.data.text.replace(/[^0-9]/g, '');
                console.log("生データ:", text);

                // 6桁ちょうど、またはターゲットを含む場合のみ「一致」とみなす
                if (text === targetCode || text.includes(targetCode)) {
                    resultDisplay.innerText = "【一致】荷下ろしOK！";
                    resultDisplay.style.color = "#00ffff";
                    document.body.style.backgroundColor = "blue";
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    // 読み取ったのが違う数字だった場合
                    resultDisplay.innerText = "不一致: " + (text || "読取不可");
                    resultDisplay.style.color = "#ff4444";
                    document.body.style.backgroundColor = "#330000";
                    if (navigator.vibrate) navigator.vibrate(500); 
                }
            } catch (e) {
                resultDisplay.innerText = "エラー";
            } finally {
                setTimeout(() => {
                    startBtn.disabled = false;
                    resultDisplay.style.color = "#ffff00";
                    if(document.body.style.backgroundColor !== "blue") {
                        resultDisplay.innerText = "もう一度スキャン";
                    }
                }, 2000);
            }
        }

        startBtn.addEventListener('click', recognize);
        startCamera();
    </script>
</body>
</html>

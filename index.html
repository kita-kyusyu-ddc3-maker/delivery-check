<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        
        /* 読み取り枠のスタイル */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); /* 周りを暗く */
        }
        .guide-box {
            width: 250px; height: 80px;
            border: 3px solid #00ff00; /* 緑の枠 */
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            position: relative;
        }
        .info { margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.8); text-align: center; }
        #result { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div class="overlay">
        <div class="guide-box"></div>
        <div class="info">
            <div>次の店舗コード: <span id="target-code">123456</span></div>
            <div id="result">スキャン中...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
    const resultDisplay = document.getElementById('result');
    const targetCode = "123456"; // 照合したい店舗コード

    // 1. カメラの起動（設定をより詳細に）
    navigator.mediaDevices.getUserMedia({ 
        video: { 
            facingMode: "environment", // 外カメラ
            width: { ideal: 1280 },
            height: { ideal: 720 }
        } 
    })
    .then(stream => { 
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            // カメラが安定するまで2秒待ってからスキャン開始
            setTimeout(recognize, 2000);
        };
    })
    .catch(err => {
        alert("カメラの起動に失敗しました。ブラウザの設定で許可してください。");
    });

    // 2. 文字認識（OCR）のメイン処理
    async function recognize() {
        resultDisplay.innerText = "スキャン中...";

        // 画面の中央部分だけを切り取って解析する（精度向上のため）
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        // 切り取り範囲（枠のサイズに合わせて調整）
        const scanWidth = video.videoWidth * 0.6; // 画面幅の60%
        const scanHeight = 100;
        const startX = (video.videoWidth - scanWidth) / 2;
        const startY = (video.videoHeight - scanHeight) / 2;

        canvas.width = scanWidth;
        canvas.height = scanHeight;

        // ビデオ映像から中央部分だけをキャンバスに描く
        context.drawImage(video, startX, startY, scanWidth, scanHeight, 0, 0, scanWidth, scanHeight);

        try {
            // Tesseractで数字だけを読み取る
            const result = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789' // 数字のみに限定
            });

            const text = result.data.text.replace(/\s+/g, ''); // 空白を消す
            console.log("読み取った数字:", text);

            if (text.includes(targetCode)) {
                // 【一致した場合】
                success(text);
            } else {
                // 【不一致の場合】1秒後に再挑戦
                setTimeout(recognize, 1000);
            }
        } catch (e) {
            console.error(e);
            setTimeout(recognize, 1000);
        }
    }

    // 3. 成功時のアクション
    function success(code) {
        resultDisplay.innerText = "一致！: " + code;
        document.body.style.backgroundColor = "blue"; // 画面を青くする
        
        // バイブレーション（Androidのみ動作）
        if (navigator.vibrate) {
            navigator.vibrate(200); 
        }
        
        // 5秒後に元の状態に戻して、次のスキャンへ（テスト用）
        setTimeout(() => {
            document.body.style.backgroundColor = "black";
            recognize();
        }, 5000);
    }
    </script>
</body>
</html>

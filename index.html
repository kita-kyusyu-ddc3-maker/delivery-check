<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>誤配防止アプリ</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="誤配防止">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9561/9561688.png">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            overflow: hidden; touch-action: manipulation;
        }

        /* 横向き制限（縦向きを促す） */
        @media screen and (orientation: landscape) {
            body::after {
                content: "画面を縦向きにして使用してください";
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: #000; color: #fff; display: flex; align-items: center;
                justify-content: center; z-index: 9999;
            }
        }
        
        /* カメラエリア（上部） */
        #v-container { 
            position: relative; width: 100%; height: 62vh; 
            background: #222; overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ガイド枠 */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.4); 
        }
        .guide-box { 
            width: 280px; height: 90px; 
            border: 2px solid rgba(255,255,255,0.2); 
            position: relative;
        }
        .guide-box::before { content: ""; position: absolute; top: -5px; left: -5px; width: 35px; height: 35px; border: 6px solid #00ff00; border-right: 0; border-bottom: 0; }
        .guide-box::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 35px; height: 35px; border: 6px solid #00ff00; border-left: 0; border-top: 0; }

        /* 操作パネル（下部） */
        .panel { 
            flex: 1; background: #111; border-top: 4px solid #333; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            /* iPhoneのホームバーと被らないための余白 */
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .target-label { font-size: 14px; color: #aaa; text-align: center; }
        .target-label b { color: #00ff00; font-size: 30px; letter-spacing: 3px; display: block; margin-top: 5px; }
        #result { font-size: 18px; font-weight: bold; color: #ffff00; text-align: center; min-height: 1.5em; width: 90%; }
        
        /* ボタン */
        #btn { 
            width: 85%; height: 75px; 
            background: #0088ff; color: #fff; 
            border: none; border-radius: 20px; 
            font-size: 26px; font-weight: bold;
            box-shadow: 0 6px 0 #0055aa;
            transition: all 0.1s;
        }
        #btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0055aa; }
        #btn:disabled { background: #444; color: #888; box-shadow: none; }
    </style>
</head>
<body>

    <div id="v-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay"><div class="guide-box"></div></div>
    </div>
    
    <div class="panel">
        <div class="target-label">ターゲット店舗コード<b>123456</b></div>
        <div id="result">初期化中...</div>
        <button id="btn" disabled>スキャン開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result');
        const btn = document.getElementById('btn');
        const targetCode = "123456"; 

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = s;
                video.onloadeddata = () => {
                    btn.disabled = false;
                    resultDisplay.innerText = "枠に数字を合わせてスキャン！";
                };
            } catch (e) {
                resultDisplay.innerText = "カメラの許可が必要です";
            }
        }

        async function doScan() {
            btn.disabled = true;
            resultDisplay.innerText = "読み取り中...";
            document.body.style.backgroundColor = "black";

            const canvas = document.createElement('canvas');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            // 枠の範囲だけを切り取る（中央の60%幅、20%高さ）
            const sW = vW * 0.6; 
            const sH = vH * 0.2; 
            const sX = (vW - sW) / 2;
            const sY = (vH - sH) / 2;

            canvas.width = sW;
            canvas.height = sH;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, sX, sY, sW, sH, 0, 0, sW, sH);

            try {
                const res = await Tesseract.recognize(canvas, 'eng');
                let raw = res.data.text;
                // 1の認識補正 + 数字以外を排除
                let clean = raw.replace(/[Il|i]/g, '1').replace(/[^0-9]/g, '');

                if (clean.includes(targetCode)) {
                    resultDisplay.innerText = "【一致】荷下ろしOK！";
                    resultDisplay.style.color = "#00ffff";
                    document.body.style.backgroundColor = "blue";
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    resultDisplay.innerText = "不一致: " + (clean || "読取不可");
                    resultDisplay.style.color = "#ff4444";
                    document.body.style.backgroundColor = "#330000";
                    if (navigator.vibrate) navigator.vibrate(400);
                }
            } catch (e) {
                resultDisplay.innerText = "エラー：もう一度試してください";
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    if (document.body.style.backgroundColor !== "blue") {
                        resultDisplay.style.color = "#ffff00";
                        resultDisplay.innerText = "次のスキャン待機中";
                    }
                }, 2000);
            }
        }

        btn.onclick = doScan;
        window.onload = init;
    </script>
</body>
</html>

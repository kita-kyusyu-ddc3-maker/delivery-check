<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner VIOLET v18</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f7;
            --purple-main: #9d8dbd;
            --purple-accent: #6c5ce7;
            --cyan: #008a8a; /* 視認性のため少し濃く */
            --red: #d63031;  /* 視認性のため少し濃く */
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #000; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Course Info (Top 10%) */
        .top-status { height: 40px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; letter-spacing: 2px; }

        /* Header Area (35%) */
        .header { height: 32vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; text-align: center; }
        .line-order { font-size: 24px; color: #444; font-weight: bold; margin-bottom: 2px; }
        .line-code { font-size: 50px; color: var(--purple-accent); font-family: 'Courier New', monospace; font-weight: 900; letter-spacing: 5px; line-height: 1; }
        .line-name { font-size: 36px; font-weight: 900; color: #000; line-height: 1.1; margin: 8px 0; width: 95%; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .line-result { font-size: 22px; font-weight: 900; height: 1.5em; }

        /* Camera (25%) */
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; box-shadow: var(--inner); background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 75px; border: 5px solid var(--purple-accent); border-radius: 15px; box-shadow: 0 0 20px rgba(108, 92, 231, 0.5); }

        /* Footer (35%) */
        .footer { height: 35vh; display: flex; align-items: center; justify-content: space-evenly; padding: 0 10px 20px; }
        .btn-side { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 35px; display: flex; align-items: center; justify-content: center; }
        .btn-side:active { box-shadow: var(--inner); }

        /* Large Round Scan Button */
        #scan-main { 
            width: 140px; height: 140px; border-radius: 50%; border: none;
            background: var(--bg); box-shadow: var(--shadow);
            color: var(--purple-accent); font-size: 28px; font-weight: 900; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #scan-main:active { box-shadow: var(--inner); transform: scale(0.95); }
        #scan-main small { font-size: 12px; margin-top: 5px; }

        #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; }
        .match { background: radial-gradient(circle, rgba(0,138,138,0.4) 0%, transparent 70%); }
        .mismatch { background: radial-gradient(circle, rgba(214,48,49,0.4) 0%, transparent 70%); }
        
        /* Setup Screen */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--bg); padding: 30px; border-radius: 30px; box-shadow: var(--shadow); width: 90%; text-align: center; }
        select { width: 100%; padding: 20px; font-size: 24px; font-weight: bold; border-radius: 15px; margin: 15px 0; border: none; background: var(--bg); box-shadow: var(--inner); color: var(--purple-accent); }
    </style>
</head>
<body>

    <div id="setup-screen" style="display:none;">
        <div class="setup-card">
            <h2 style="margin-bottom:20px;">コースを選択</h2>
            <select id="shift-in" onchange="loadCourseMenu()">
                <option value="1">1便 (101-134)</option>
                <option value="2">2便 (201-234)</option>
                <option value="3">3便 (301)</option>
            </select>
            <select id="course-in"></select>
            <button class="btn-side" style="width:100%; border-radius:15px; margin-top:20px; font-size:24px; height:60px;" onclick="startApp()">確定</button>
        </div>
    </div>

    <div id="flash"></div>
    <div id="top-tag" class="top-status">COURSE --- ACTIVE</div>

    <div class="header">
        <div id="order-label" class="line-order">No. 00</div>
        <div id="code-label" class="line-code">000000</div>
        <div id="name-label" class="line-name">店舗名</div>
        <div id="res-label" class="line-result">待機中</div>
    </div>

    <div id="cam-area">
        <div class="cam-frame">
            <video id="video" autoplay playsinline muted></video>
            <div class="guide-rect"></div>
        </div>
    </div>
    
    <div class="footer">
        <button class="btn-side" onclick="stepShop(-1)">◀</button>
        <button id="scan-main" onclick="runScanner()">SCAN<small>開始</small></button>
        <button class="btn-side" onclick="stepShop(1)">▶</button>
    </div>

    <script>
        const db = {}; 
        function genData() {
            for(let c=101; c<=134; c++) db[c] = [{n:`第1配送センター`, c:`${c}001`}, {n:`港町マーケット`, c:`${c}002`}].map(v => ({n:v.n, c:v.c.padStart(6,'0')}));
            for(let c=201; c<=234; c++) db[c] = [{n:`駅前商店`, c:`${c}111`}, {n:`山の手デポ`, c:`${c}222`}].map(v => ({n:v.n, c:v.c.padStart(6,'0')}));
            db[301] = [{n:"深夜急行A支店", c:"301001"}, {n:"深夜急行B支店", c:"301002"}];
        }
        genData();

        let myCourse = localStorage.getItem('violet_v18') || null;
        let idx = 0;
        let audio = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep() {
            const now = audio.currentTime;
            [1200, 1600].forEach((f, i) => {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.frequency.setValueAtTime(f, now + i*0.06);
                o.connect(g); g.connect(audio.destination);
                g.gain.setValueAtTime(0, now + i*0.06);
                g.gain.linearRampToValueAtTime(0.1, now + i*0.06 + 0.01);
                g.gain.linearRampToValueAtTime(0, now + i*0.06 + 0.05);
                o.start(now + i*0.06); o.stop(now + i*0.06 + 0.05);
            });
        }

        function loadCourseMenu() {
            const s = document.getElementById('shift-in').value;
            const menu = document.getElementById('course-in');
            menu.innerHTML = '';
            let start = s==1?101:s==2?201:301;
            let end = s==1?134:s==2?234:301;
            for(let i=start; i<=end; i++) {
                let o = document.createElement('option');
                o.value = i; o.text = i + "コース";
                menu.add(o);
            }
        }

        function startApp() {
            myCourse = document.getElementById('course-in').value;
            localStorage.setItem('violet_v18', myCourse);
            document.getElementById('setup-screen').style.display = 'none';
            boot();
        }

        function boot() {
            if(!myCourse) { loadCourseMenu(); document.getElementById('setup-screen').style.display='flex'; return; }
            document.getElementById('top-tag').innerText = `COURSE ${myCourse} ACTIVE`;
            ui();
            cam();
        }

        function ui() {
            const list = db[myCourse];
            const item = list[idx];
            // 2桁表示 (01, 02...)
            document.getElementById('order-label').innerText = `No. ${String(idx + 1).padStart(2, '0')}`;
            document.getElementById('code-label').innerText = item.c;
            document.getElementById('name-label').innerText = item.n;
            document.getElementById('res-label').innerText = "スキャン待機中";
            document.getElementById('res-label').style.color = "var(--purple-main)";
        }

        function stepShop(d) {
            const list = db[myCourse];
            idx = Math.max(0, Math.min(list.length - 1, idx + d));
            ui();
        }

        async function cam() {
            const v = document.getElementById('video');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                v.srcObject = s;
            } catch (e) { alert("カメラ使用を許可してください"); }
        }

        async function runScanner() {
            if(audio.state === 'suspended') audio.resume();
            playBeep();
            const btn = document.getElementById('scan-main');
            const resL = document.getElementById('res-label');
            const flash = document.getElementById('flash');
            btn.disabled = true;
            resL.innerText = "読み取り中...";

            const v = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const sW = v.videoWidth * 0.6; const sH = v.videoHeight * 0.15;
            canvas.width = 300; 
            canvas.height = (sH * (300 / sW));
            canvas.getContext('2d').drawImage(v, (v.videoWidth-sW)/2, (v.videoHeight-sH)/2, sW, sH, 0, 0, canvas.width, canvas.height);

            try {
                const res = await Tesseract.recognize(canvas, 'eng');
                let raw = res.data.text.replace(/[I|i|l]/g, '1').replace(/[^0-9]/g, '');
                const target = db[myCourse][idx].c;
                
                if (raw.includes(target)) {
                    resL.innerText = `OK: ${raw.slice(0,6)}`;
                    resL.style.color = "var(--cyan)";
                    flash.className = "match"; flash.style.opacity = 1;
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } else {
                    resL.innerText = `NG: ${raw.slice(0,6) || "不明"}`;
                    resL.style.color = "var(--red)";
                    flash.className = "mismatch"; flash.style.opacity = 1;
                    if(navigator.vibrate) navigator.vibrate(400);
                }
            } catch (e) { resL.innerText = "エラー"; }
            setTimeout(() => { btn.disabled = false; flash.style.opacity = 0; }, 1500);
        }
        window.onload = boot;
    </script>
</body>
</html>

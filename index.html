<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner VIOLET v35</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f7;
            --purple-accent: #6c5ce7;
            --cyan: #008a8a;
            --red: #d63031;
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 帯 */
        .top-id-bar { height: 70px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .settings-btn { background: none; border: none; color: white; font-size: 35px; padding: 10px; }
        .course-title { font-size: 38px; flex-grow: 1; text-align: center; margin-right: 45px; }

        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; text-align: center; }
        .line-name { font-size: 34px; font-weight: 900; color: #000; line-height: 1.1; height: 2.2em; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 95%; }
        .line-code { font-size: 52px; color: var(--purple-accent); font-family: monospace; font-weight: 900; letter-spacing: 5px; }
        .line-result { font-size: 26px; font-weight: 900; height: 1.2em; color: #888; }

        /* カメラとガイド枠 */
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; box-shadow: var(--inner); background: #000; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 80px; border: 2px solid var(--purple-accent); border-radius: 15px; z-index: 500; cursor: pointer; pointer-events: auto; }

        /* 小型化した手入力モーダル */
        #manual-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .manual-card { background: var(--bg); padding: 20px; border-radius: 20px; width: 280px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #manual-input { width: 100%; padding: 10px; font-size: 36px; text-align: center; border-radius: 10px; border: 2px solid var(--purple-accent); margin-bottom: 15px; outline: none; background: #fff; }

        /* フッター */
        .footer { height: 35vh; display: flex; align-items: center; justify-content: space-evenly; padding: 0 10px 20px; }
        .btn-side { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 45px; display: flex; align-items: center; justify-content: center; }
        #scan-main { width: 155px; height: 155px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 22px; font-weight: 900; }
        #scan-main.ready { background: var(--bg); color: var(--purple-accent); font-size: 34px; }

        /* 設定画面 */
        #setup-screen { position: fixed; inset: 0; background: #f0f0f7; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 15px; font-size: 24px; margin: 10px 0 20px; border: 2px solid #ddd; border-radius: 10px; background: #fff; color: #000; }
        #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000; }
        .match { background: radial-gradient(circle, rgba(0,138,138,0.4) 0%, transparent 70%); }
        .mismatch { background: radial-gradient(circle, rgba(214,48,49,0.4) 0%, transparent 70%); }
    </style>
</head>
<body>

    <div id="setup-screen" style="display: flex;">
        <div class="setup-card">
            <h2 style="text-align: center; margin-bottom: 20px;">コース設定</h2>
            <label>1. 便を選択</label>
            <select id="shift-in" onchange="updateCourseOptions()">
                <option value="1">1便</option>
                <option value="2">2便</option>
                <option value="3">3便</option>
            </select>
            <label>2. コースを選択</label>
            <select id="course-in"></select>
            <button style="width: 100%; height: 60px; background: #6c5ce7; color: white; border: none; border-radius: 10px; font-size: 24px; font-weight: bold;" onclick="applySettings()">設定を確定</button>
        </div>
    </div>

    <div id="manual-box">
        <div class="manual-card">
            <p style="margin-bottom: 10px; font-weight: bold;">直接入力</p>
            <input type="tel" id="manual-input" maxlength="6" placeholder="------">
            <button style="width: 100%; padding: 10px; background: #999; color: #fff; border: none; border-radius: 8px;" onclick="closeManual()">キャンセル</button>
        </div>
    </div>

    <div id="flash"></div>
    <div class="top-id-bar">
        <button class="settings-btn" onclick="openSetup()">⚙</button>
        <div id="top-id-display" class="course-title">--- - --</div>
    </div>

    <div class="header">
        <div id="name-label" class="line-name">店舗名</div>
        <div id="code-label" class="line-code">000000</div>
        <div id="res-label" class="line-result">READY</div>
    </div>

    <div id="cam-area">
        <div class="cam-frame">
            <video id="video" autoplay playsinline muted></video>
            <div class="guide-rect" onclick="openManual()"></div>
        </div>
    </div>
    
    <div class="footer">
        <button class="btn-side" onclick="stepShop(-1)">◀</button>
        <button id="scan-main" disabled onclick="handleScanButton()">待機中</button>
        <button class="btn-side" onclick="stepShop(1)">▶</button>
    </div>

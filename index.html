<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR v7</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        /* 画面全体を固定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            overflow: hidden; /* スクロールさせない */
        }
        
        /* カメラエリア（画面の約60%） */
        #v-container { 
            position: relative; width: 100%; height: 60vh; 
            background: #222; overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ガイド枠 */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.4); 
        }
        .guide-box { width: 280px; height: 80px; border: 2px solid rgba(255,255,255,0.3); position: relative; }
        .guide-box::before { content: ""; position: absolute; top: -5px; left: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-right: 0; border-bottom: 0; }
        .guide-box::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-left: 0; border-top: 0; }

        /* 操作パネル（画面の約40%） */
        .panel { 
            flex: 1; background: #111; border-top: 2px solid #333; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            padding: 10px 0 25px 0; /* 下側に余裕を持たせる */
        }
        .target { font-size: 14px; color: #aaa; }
        .target b { color: #00ff00; font-size: 24px; }
        #result { font-size: 18px; font-weight: bold; color: #ffff00; text-align: center; padding: 0 10px; }
        
        /* 青いボタン：隠れないようにサイズと余白を調整 */
        #btn { 
            width: 85%; height: 60px; 
            background: #0088ff; color: #fff; 
            border: none; border-radius: 12px; 
            font-size: 22px; font-weight: bold;
            box-shadow: 0 4px 0 #0055aa;
        }
        #btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0055aa; }
        #btn:disabled { background: #444; color: #888; box-shadow: none; }
    </style>
</head>
<body>

    <div id="v-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay"><div class="guide-box"></div></div>
    </div>
    
    <div class="panel">
        <div class="target">ターゲット: <b>123456</b></div>
        <div id="result">初期化中...</div>
        <button id="btn" disabled>スキャン開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result');
        const btn = document.getElementById('btn');
        const targetCode = "123456"; 

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = s;
                video.onloadeddata = () => {
                    btn.disabled = false;
                    resultDisplay.innerText = "枠に数字を合わせてスキャン";
                };
            } catch (e) {
                resultDisplay.innerText = "カメラ許可が必要です";
            }
        }

        async function doScan() {
            btn.disabled = true;
            resultDisplay.innerText = "読み取り中...";
            document.body.style.backgroundColor = "black";

            const canvas = document.createElement('canvas');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            // 枠の範囲だけを切り取る
            const sW = vW * 0.6; 
            const sH = vH * 0.15; 
            const sX = (vW - sW) / 2;
            const sY = (vH - sH) / 2;

            canvas.width = sW;
            canvas.height = sH;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, sX, sY, sW, sH, 0, 0, sW, sH);

            try {
                const res = await Tesseract.recognize(canvas, 'eng');
                let raw = res.data.text;
                // 1の認識補正
                let clean = raw.replace(/[Il|i]/g, '1').replace(/[^0-9]/g, '');

                if (clean.includes(targetCode)) {
                    resultDisplay.innerText = "【一致】OK！";
                    resultDisplay.style.color = "#00ffff";
                    document.body.style.backgroundColor = "blue";
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    resultDisplay.innerText = "不一致: " + (clean || "読取不可");
                    resultDisplay.style.color = "#ff4444";
                    document.body.style.backgroundColor = "#330000";
                }
            } catch (e) {
                resultDisplay.innerText = "エラー：再試行してください";
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    if (document.body.style.backgroundColor !== "blue") {
                        resultDisplay.style.color = "#ffff00";
                    }
                }, 2000);
            }
        }

        btn.onclick = doScan;
        window.onload = init;
    </script>
</body>
</html>

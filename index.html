<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        
        /* 読み取り枠のスタイル */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); /* 周りを暗く */
        }
        .guide-box {
            width: 250px; height: 80px;
            border: 3px solid #00ff00; /* 緑の枠 */
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            position: relative;
        }
        .info { margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.8); text-align: center; }
        #result { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div class="overlay">
        <div class="guide-box"></div>
        <div class="info">
            <div>次の店舗コード: <span id="target-code">123456</span></div>
            <div id="result">スキャン中...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result');
        const targetCode = "123456"; // ここにスプレッドシート等からのコードを入れる

        // カメラの起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("カメラが起動できません: " + err));

        // 認識処理（一定間隔で実行）
        async function recognize() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // Tesseractで数字のみを認識
            const result = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789'
            });

            const text = result.data.text.trim();
            if (text.includes(targetCode)) {
                // 一致した場合
                success();
            }
            requestAnimationFrame(recognize);
        }

        function success() {
            resultDisplay.innerText = "一致！OK";
            document.body.style.backgroundColor = "blue";
            if (navigator.vibrate) navigator.vibrate(200); // 1回バイブ
        }

        video.addEventListener('play', () => {
            setTimeout(recognize, 1000);
        });
    </script>
</body>
</html>

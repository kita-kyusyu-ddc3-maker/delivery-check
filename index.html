    <style>
        :root {
            --bg: #f0f0f7;
            --purple-accent: #6c5ce7;
            --ok-blue: #3498db;
            --ng-red: #e74c3c;
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .top-id-bar { height: 70px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .settings-btn { background: none; border: none; color: white; font-size: 35px; padding: 10px; cursor: pointer; }
        .course-title { font-size: 38px; flex-grow: 1; text-align: center; margin-right: 45px; }

        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; text-align: center; }
        .line-name { font-size: 32px; font-weight: 900; color: #000; line-height: 1.1; height: 2.2em; display: flex; align-items: center; justify-content: center; width: 95%; overflow: hidden; }
        .line-code { font-size: 55px; color: var(--purple-accent); font-family: monospace; font-weight: 900; letter-spacing: 5px; }

        #scan-step-label { font-size: 20px; font-weight: bold; color: #666; margin-bottom: 8px; background: #e0e0eb; padding: 4px 20px; border-radius: 12px; border: 1px solid #ccc; }

        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; box-shadow: var(--inner); background: #000; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .guide-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 80px; border: 4px solid var(--purple-accent); border-radius: 12px; z-index: 500; transition: 0.3s; }
        .guide-rect.step2 { border-color: #ff9f43; }

        #symbol-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; font-weight: bold; pointer-events: none; z-index: 5000; opacity: 0; }
        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 20%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
        }
        .animate-symbol { animation: floatUp 0.8s ease-out forwards; }

        #setup-screen { position: fixed; inset: 0; background: #f0f0f7; z-index: 9000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .setup-card { background: #fff; padding: 20px; border-radius: 25px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .delivery-list { width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; cursor: pointer; }
        .list-item.done { background: #f0fff4; color: #2ecc71; }
        .list-item .unit-count { font-size: 15px; color: #666; background: #e0e0e0; padding: 3px 10px; border-radius: 6px; }

        .footer { height: 35vh; display: flex; align-items: center; justify-content: space-evenly; padding: 0 10px 20px; }
        .btn-side { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 45px; display: flex; align-items: center; justify-content: center; outline: none; }
        #scan-main { width: 155px; height: 155px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 20px; font-weight: 900; outline: none; }
        #scan-main.ready { background: var(--bg); color: var(--purple-accent); font-size: 28px; }
        #scan-main.active { background: var(--purple-accent); color: #fff; box-shadow: var(--inner); }
    </style>
</head>

            db[222] = [{n:"福岡博多駅東二丁目",c:"242230"},{n:"博多駅東",c:"049851"},{n:"西鉄ホテル クルーム博多",c:"235832"},{n:"住吉二丁目",c:"090925"}];
            db[223] = [{n:"福岡香椎浜三丁目",c:"242051"},{n:"福岡アイランドシティ",c:"173166"},{n:"福岡香椎駅前",c:"220606"},{n:"ミズ西鉄香椎駅前",c:"247960"},{n:"香椎駅前一丁目",c:"092605"}];
            db[224] = [{n:"博多築港本町",c:"235683"},{n:"博多諸岡五丁目",c:"200390"},{n:"春日須玖",c:"275033"},{n:"大野城東大利二丁目",c:"195423"},{n:"大野城乙金三丁目",c:"242022"}];
            db[225] = [{n:"博多駅南一丁目",c:"191230"},{n:"博多駅西",c:"092083"},{n:"博多駅東三丁目",c:"195430"},{n:"春日桜ヶ丘六丁目",c:"362944"},{n:"福岡金隈",c:"024957"}];
            db[226] = [{n:"福岡妙見通り",c:"363100"},{n:"博多吉塚六丁目",c:"357280"},{n:"博多吉塚一丁目",c:"283305"},{n:"福岡キャナルシティ博多前",c:"176437"},{n:"博多駅大博通り",c:"154223"}];
            db[227] = [{n:"博多千代四丁目",c:"145968"},{n:"空港北ユニバ通り",c:"226170"},{n:"空港前二丁目",c:"134025"},{n:"志免片峰中央一丁目",c:"298554"},{n:"志免田富三丁目",c:"267973"}];
            db[228] = [{n:"福岡野間",c:"134568"},{n:"遠賀山田峠",c:"230125"},{n:"宗像徳重",c:"145135"},{n:"宗像光岡",c:"345064"},{n:"福津日蒔野六丁目",c:"381189"},{n:"古賀美明一丁目",c:"081599"}];
            db[229] = [{n:"博多",c:"275180"},{n:"筑紫通比恵町",c:"092203"},{n:"山王",c:"079013"},{n:"西鉄桜並木駅",c:"381440"},{n:"博多春町三丁目",c:"195452"}];
            db[230] = [{n:"福岡香椎照葉四丁目",c:"381255"},{n:"博多石城町",c:"208321"},{n:"博多古門戸町",c:"283423"},{n:"博多住吉通り",c:"381597"}];
            db[231] = [{n:"下原一丁目",c:"165860"},{n:"福岡下原四丁目",c:"373089"},{n:"福岡魁誠高校前",c:"191282"},{n:"福岡篠栗駅前",c:"015929"},{n:"久山久原堀田",c:"235588"}];
            db[232] = [{n:"博多駅明治公園",c:"154690"},{n:"博多住吉五丁目",c:"298761"},{n:"福岡下川端町",c:"242246"},{n:"上川端町",c:"134597"},{n:"博多駅前",c:"373103"}];
            db[233] = [{n:"博多駅筑紫口",c:"145804"},{n:"春日原北町",c:"154542"},{n:"博多南駅前",c:"357624"},{n:"太宰府吉松三丁目",c:"282984"}];
            db[234] = [{n:"西鉄白木原駅",c:"381574"},{n:"福岡博多駅前二丁目",c:"191313"},{n:"吉塚三丁目",c:"230378"},{n:"吉塚五丁目",c:"134404"},{n:"吉塚本町",c:"176845"},{n:"中洲一丁目",c:"091468"}];

            // --- 3便 ---
            db[301] = [{n:"中洲二丁目",c:"176673"},{n:"中洲であい橋通り",c:"372730"}];
        }

        let myCourse = localStorage.getItem('v41_course_id') || 101;
        let idx = 0;
        let worker = null;
        let isAutoScan = false;
        let scanStep = 1; // 1:看板, 2:シール
        let history = JSON.parse(localStorage.getItem('v41_scan_history') || '{}'); 

        function openSetup() {
            document.getElementById('setup-screen').style.display = "flex";
            updateCourseOptions();
            renderList();
        }

        function updateCourseOptions() {
            const shift = document.getElementById('shift-in').value;
            const menu = document.getElementById('course-in');
            menu.innerHTML = "";
            let start, end;
            if(shift == "1") { start = 101; end = 134; }
            else if(shift == "2") { start = 201; end = 234; }
            else { start = 301; end = 301; }
            for(let i=start; i<=end; i++) {
                if(db[i]) {
                    let o = document.createElement("option");
                    o.value = i; o.text = i + "コース";
                    menu.add(o);
                    if(i == myCourse) o.selected = true;
                }
            }
        }

        function applySettings() {
            myCourse = document.getElementById('course-in').value;
            localStorage.setItem('v41_course_id', myCourse);
            document.getElementById('setup-screen').style.display = "none";
            idx = 0;
            ui();
            if(!worker) initAI();
        }

        async function initAI() {
            const btn = document.getElementById('scan-main');
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' });
            btn.disabled = false;
            btn.innerText = "AUTO SCAN";
            btn.classList.add('ready');
        }

        function renderList() {
            const listUi = document.getElementById('delivery-list-ui');
            listUi.innerHTML = "";
            const shops = db[myCourse] || [];
            shops.forEach((s, i) => {
                const isDone = i < idx;
                const myHist = history[s.c] || [];
                const div = document.createElement('div');
                div.className = `list-item ${isDone ? 'done' : ''}`;
                div.innerHTML = `<span>${isDone ? '✔ ' : ''}${i+1}. ${s.n}</span><span class="unit-count">${myHist.length}台</span>`;
                div.onclick = () => {
                    if(myHist.length === 0) alert("記録なし");
                    else alert(`${s.n}\n履歴:\n` + myHist.map(h => `・${h.date} ${h.time}`).join("\n"));
                };
                listUi.appendChild(div);
            });
        }

        function ui() {
            const item = db[myCourse][idx];
            document.getElementById('top-id-display').innerText = `${myCourse} - ${String(idx + 1).padStart(2, '0')}`;
            document.getElementById('code-label').innerText = item.c;
            document.getElementById('name-label').innerText = item.n;
            updateStepLabel();
        }

        function updateStepLabel() {
            const label = document.getElementById('scan-step-label');
            const guide = document.getElementById('guide');
            if(scanStep === 1) {
                label.innerText = "STEP 1: 看板スキャン";
                label.style.color = "var(--purple-accent)";
                guide.classList.remove('step2');
            } else {
                label.innerText = "STEP 2: シールスキャン";
                label.style.color = "#ff9f43";
                guide.classList.add('step2');
            }
        }

        function stepShop(d) {
            const list = db[myCourse];
            idx = Math.max(0, Math.min(list.length - 1, idx + d));
            scanStep = 1; 
            ui();
        }

        function toggleAutoScan() {
            isAutoScan = !isAutoScan;
            const btn = document.getElementById('scan-main');
            if(isAutoScan) {
                btn.innerText = "STOP";
                btn.classList.add('active');
                runScannerLoop();
            } else {
                btn.innerText = "AUTO SCAN";
                btn.classList.remove('active');
            }
        }

        async function runScannerLoop() {
            if(!isAutoScan) return;
            const v = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const scale = v.videoWidth / v.clientWidth;
            canvas.width = 180; canvas.height = 80;
            const sx = (v.videoWidth - 180 * scale) / 2;
            const sy = (v.videoHeight - 80 * scale) / 2;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(v, sx, sy, 180 * scale, 80 * scale, 0, 0, 180, 80);

            let imageData = ctx.getImageData(0,0,180,80);
            for(let i=0; i<imageData.data.length; i+=4) {
                let g = imageData.data[i]*0.3 + imageData.data[i+1]*0.59 + imageData.data[i+2]*0.11;
                imageData.data[i] = imageData.data[i+1] = imageData.data[i+2] = g > 120 ? 255 : 0;
            }
            ctx.putImageData(imageData, 0, 0);

            try {
                const res = await worker.recognize(canvas);
                const txt = res.data.text.replace(/[^0-9]/g, '');
                if(txt.length >= 6) checkMatch(txt);
            } catch(e) {}
            setTimeout(runScannerLoop, 300);
        }

        let lastCheckTime = 0;
        function checkMatch(input) {
            const now = Date.now();
            if(now - lastCheckTime < 1800) return;
            const targetCode = db[myCourse][idx].c;
            if(!input.includes(targetCode)) {
                if(input.length === 6) { lastCheckTime = now; showVisual(false); if(navigator.vibrate) navigator.vibrate(400); }
                return;
            }
            lastCheckTime = now;
            if(scanStep === 1) {
                scanStep = 2;
                if(navigator.vibrate) navigator.vibrate(100);
                updateStepLabel();
            } else {
                saveRecord(targetCode);
                showVisual(true);
                scanStep = 1;
                updateStepLabel();
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        function saveRecord(code) {
            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
            const timeStr = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
            if(!history[code]) history[code] = [];
            history[code].push({ date: dateStr, time: timeStr });
            localStorage.setItem('v41_scan_history', JSON.stringify(history));
            ui();
        }

        function showVisual(isOk) {
            const overlay = document.getElementById('symbol-overlay');
            overlay.innerText = isOk ? "○" : "×";
            overlay.style.color = isOk ? "var(--ok-blue)" : "var(--ng-red)";
            overlay.classList.remove('animate-symbol');
            void overlay.offsetWidth;
            overlay.classList.add('animate-symbol');
        }

        async function cam() {
            const v = document.getElementById('video');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                v.srcObject = s;
            } catch(e) {}
        }

        window.onload = () => { genData(); updateCourseOptions(); cam(); ui(); };
    </script>

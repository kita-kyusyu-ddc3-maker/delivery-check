<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DDC Scanner v1.31</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #f0f0f7; --purple: #6c5ce7; --ok: #3498db; --ng: #e74c3c; --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff; --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; font-family: sans-serif; }
        .top-bar { height: 70px; background: var(--purple); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; position: relative; }
        .course-title { font-size: 32px; font-weight: 900; flex-grow: 1; text-align: center; letter-spacing: 1px; }
        .v-tag { font-size: 10px; opacity: 0.8; position: absolute; right: 10px; bottom: 5px; }
        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .line-name { font-size: 28px; font-weight: 900; color: #000; height: 2.2em; display: flex; align-items: center; justify-content: center; width: 95%; line-height: 1.1; }
        .line-code { font-size: 50px; color: var(--purple); font-family: monospace; font-weight: 900; letter-spacing: 5px; }
        #step-label { font-size: 18px; font-weight: bold; color: #666; margin-bottom: 5px; background: #e0e0eb; padding: 4px 20px; border-radius: 12px; border: 1px solid #ccc; }
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; background: #000; box-shadow: var(--inner); position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 80px; border: 4px solid var(--purple); border-radius: 12px; pointer-events: none; }
        .guide.step2 { border-color: #ff9f43; }
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: none; flex-direction: column; padding: 20px; padding-top: 50px; }
        .setup-card { background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .list-container { flex-grow: 1; overflow-y: auto; background: #fff; border-radius: 20px; box-shadow: var(--inner); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; }
        .list-item.done { color: #2ecc71; background: #fafffa; }
        .footer { height: 32vh; display: flex; align-items: center; justify-content: space-evenly; padding-bottom: 10px; }
        .btn-side { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple); font-size: 40px; }
        #scan-btn { width: 145px; height: 145px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 24px; font-weight: 900; }
        #scan-btn.ready { background: var(--bg); color: var(--purple); }
        #scan-btn.active { background: var(--purple); color: #fff; box-shadow: var(--inner); }
        #popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .pop-card { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        #overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 240px; font-weight: bold; pointer-events: none; z-index: 5000; opacity: 0; }
        .pop-anim { animation: ps 1.3s ease-in-out forwards; }
        @keyframes ps { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 85%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.8)} }
    </style>
</head>
<body>
    <div id="popup"><div class="pop-card"><h3 id="pop-t"></h3><div id="pop-x" style="margin:20px 0; text-align:left; white-space:pre-wrap; font-size:20px;"></div><button onclick="snd('tap'); document.getElementById('popup').style.display='none';" style="width:100%; padding:15px; background:var(--purple); color:#fff; border:none; border-radius:10px; font-weight:bold; font-size:18px;">閉じる</button></div></div>
    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="text-align:center; margin-bottom:10px; font-size:20px;">DDC 配送設定</h2>
            <select id="s-in" onchange="snd('tap'); upCourse();" style="width:100%; padding:15px; font-size:20px; margin-bottom:10px; border-radius:10px;"><option value="1">1便</option><option value="2">2便</option><option value="3">3便</option></select>
            <select id="c-in" onchange="snd('tap');" style="width:100%; padding:15px; font-size:20px; margin-bottom:10px; border-radius:10px;"></select>
            <button onclick="apply();" style="width:100%; height:60px; background:var(--purple); color:#fff; border:none; border-radius:12px; font-size:20px; font-weight:bold;">設定を確定</button>
        </div>
        <div class="list-container" id="list-ui"></div>
        <button onclick="snd('tap'); document.getElementById('setup-screen').style.display='none';" style="margin-top:10px; width:100%; padding:20px; background:#666; color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:18px;">戻る</button>
    </div>
    <div id="overlay"></div>
    <div class="top-bar"><button style="background:none; border:none; color:#fff; font-size:35px; padding:10px;" onclick="snd('tap'); openSet();">⚙</button><div class="course-title" id="disp-c">DDC SCANNER</div><span class="v-tag">v1.31</span></div>
    <div class="header"><div id="step-label">STEP 1: 台車看板スキャン</div><div id="disp-n" class="line-name">LOADING...</div><div id="disp-code" class="line-code">000000</div></div>
    <div id="cam-area"><div class="cam-frame"><video id="video" autoplay playsinline muted></video><div id="guide" class="guide"></div></div></div>
    <div class="footer"><button class="btn-side" onclick="snd('tap'); step(-1);">◀</button><button id="scan-btn" disabled onclick="toggle()">待機中</button><button class="btn-side" onclick="snd('tap'); step(1);">▶</button></div>

    <script>
        let db = {}; const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkGW07X71K4ABtBqX4HI4mbH4D9fChVkM8eoBVpvlyG5Ga_7a6vL6o6Q1zIOpJBFOZ-P--mBMbAvto/pub?gid=0&single=true&output=csv";
        let curC = localStorage.getItem('v41_course_id') || "";
        let curI = parseInt(localStorage.getItem('v131_idx')) || 0;
        let stepN = 1, isAuto = false, worker = null, ac = null, lastT = 0;
        let hist = JSON.parse(localStorage.getItem('v41_hist_data') || '[]');

        function save() { localStorage.setItem('v41_hist_data', JSON.stringify(hist)); localStorage.setItem('v41_course_id', curC); localStorage.setItem('v131_idx', curI); }
        function getC() { let c = hist[0]; if(!c || c.isFinalized || c.course !== curC) { c = { id: Date.now(), course: curC, shops: {}, completedCodes: [], isFinalized: false }; hist.unshift(c); if(hist.length > 3) hist.pop(); } return c; }
        function snd(t) { if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if(ac.state==='suspended') ac.resume(); const n=ac.currentTime, g=ac.createGain(); g.connect(ac.destination); const o=ac.createOscillator(); o.connect(g); if(t==='ok'){ o.frequency.setValueAtTime(659,n); g.gain.setValueAtTime(0.5,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.5); o.start(); o.stop(n+0.5); } else if(t==='tap'){ o.frequency.setValueAtTime(880,n); g.gain.setValueAtTime(0.1,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.1); o.start(); o.stop(n+0.1); } else { o.type='sawtooth'; o.frequency.setValueAtTime(130,n); g.gain.setValueAtTime(0.3,n); g.gain.linearRampToValueAtTime(0,n+0.4); o.start(); o.stop(n+0.4); } }
        async function load() { try { const res = await fetch(URL); const csv = await res.text(); const lines = csv.split("\n"); for(let i=1; i<lines.length; i++){ const r = lines[i].split(","); if(r.length<3) continue; const c=r[0].trim(); if(!db[c]) db[c]=[]; db[c].push({n:r[1].trim(), c:r[2].trim().replace(/"/g,"")}); } if(!curC || !db[curC]) curC = Object.keys(db)[0]; upCourse(); ui(); init(); } catch(e){ document.getElementById('disp-n').innerText="エラー"; } }
        function upCourse() { const s = document.getElementById('s-in').value, m = document.getElementById('c-in'); m.innerHTML=""; Object.keys(db).sort().filter(c=>c.startsWith(s)).forEach(c=>{ let o=document.createElement("option"); o.value=c; o.text=c+"コース"; m.add(o); if(c==curC) o.selected=true; }); }
        function openSet() { document.getElementById('setup-screen').style.display="flex"; render(); }
        function render() { const container = document.getElementById('list-ui'); container.innerHTML=""; const entry = getC(); (db[curC]||[]).forEach((s,i)=>{ const times = entry.shops[s.c] || [], done = entry.completedCodes.includes(s.c); const div = document.createElement('div'); div.className=`list-item ${done?'done':''}`; div.innerHTML=`<span>${done?'✔':'-'} ${i+1}. ${s.n}</span><span>${times.length||'-'}台</span>`; div.onclick = () => { snd('tap'); if(times.length > 0) { document.getElementById('pop-t').innerText=s.n; document.getElementById('pop-x').innerText="納品時刻:\n"+times.map(t=>"・"+t).join("\n"); document.getElementById('popup').style.display="flex"; } }; container.appendChild(div); }); }
        function apply() { snd('tap'); curC = document.getElementById('c-in').value; curI=0; stepN=1; getC(); save(); ui(); document.getElementById('setup-screen').style.display='none'; }
        async function init() { const b = document.getElementById('scan-btn'); worker = await Tesseract.createWorker(); await worker.loadLanguage('eng'); await worker.initialize('eng'); await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' }); b.disabled=false; b.innerText="AUTO SCAN"; b.classList.add('ready'); }
        function ui() { if(!db[curC]) return; const itm = db[curC][curI]; document.getElementById('disp-c').innerText = `${curC} - ${curI+1}`; document.getElementById('disp-code').innerText = itm.c; document.getElementById('disp-n').innerText = itm.n; const lbl = document.getElementById('step-label'), gd = document.getElementById('guide'); if(stepN===1){ lbl.innerText="STEP 1: 台車看板スキャン"; lbl.style.color="var(--purple)"; gd.classList.remove('step2'); } else { lbl.innerText="STEP 2: ラベルスキャン"; lbl.style.color="#ff9f43"; gd.classList.add('step2'); } }
        function step(d) { const list = db[curC], c = getC(); if(d===1){ const shopC = list[curI].c; if((c.shops[shopC]||[]).length > 0 && !c.completedCodes.includes(shopC)) c.completedCodes.push(shopC); if(curI === list.length-1) { document.getElementById('pop-t').innerText="完了"; document.getElementById('pop-x').innerText="全店舗完了しました。"; document.getElementById('popup').style.display="flex"; } } curI = Math.max(0, Math.min(list.length-1, curI+d)); stepN=1; save(); ui(); }
        function toggle() { snd('tap'); isAuto = !isAuto; const b = document.getElementById('scan-btn'); if(isAuto){ b.innerText="STOP"; b.classList.add('active'); run(); } else { b.innerText="AUTO SCAN"; b.classList.remove('active'); } }
        async function run() { if(!isAuto) return; const v = document.getElementById('video'), canvas = document.createElement('canvas'); canvas.width=180; canvas.height=80; const ctx = canvas.getContext('2d'); ctx.drawImage(v, (v.videoWidth-600)/2, (v.videoHeight-260)/2, 600, 260, 0, 0, 180, 80); try { const res = await worker.recognize(canvas); const txt = res.data.text.replace(/[^0-9]/g, ''); if(txt.length >= 6) check(txt); } catch(e){} if(isAuto) setTimeout(run, 300); }
        function check(input) { const now = Date.now(); if(now-lastT < 1800) return; const target = db[curC][curI].c; if(!input.includes(target)){ if(input.length===6){ lastT=now; vis(false); snd('ng'); } return; } lastT=now; const c = getC(); if(stepN===1){ stepN=2; snd('ok'); ui(); } else { if(!c.shops[target]) c.shops[target]=[]; c.shops[target].push(new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})); vis(true); snd('ok'); stepN=1; save(); ui(); toggle(); } }
        function vis(ok) { const o = document.getElementById('overlay'); o.innerText = ok ? "○" : "×"; o.style.color = ok ? "var(--ok)" : "var(--ng)"; o.classList.remove('pop-anim'); void o.offsetWidth; o.classList.add('pop-anim'); }
        async function cam() { const v = document.getElementById('video'); try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:{ideal:1280}}}); v.srcObject=s; } catch(e){ alert("カメラ失敗"); } }
        window.onload = () => { load(); cam(); };
    </script>
</body>
</html>

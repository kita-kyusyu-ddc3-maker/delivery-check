<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR v6</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #v-container { position: relative; width: 100%; flex: 1; background: #222; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
        .guide-box { width: 280px; height: 80px; border: 2px solid rgba(255,255,255,0.3); position: relative; }
        .guide-box::before { content: ""; position: absolute; top: -5px; left: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-right: 0; border-bottom: 0; }
        .guide-box::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-left: 0; border-top: 0; }
        .panel { background: #111; padding: 20px; border-top: 2px solid #333; text-align: center; }
        .target { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .target b { color: #00ff00; font-size: 24px; }
        #result { font-size: 18px; font-weight: bold; color: #ffff00; margin: 10px 0; min-height: 1.5em; }
        #btn { width: 90%; height: 65px; background: #0088ff; color: #fff; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; }
        #btn:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

    <div id="v-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay"><div class="guide-box"></div></div>
    </div>
    
    <div class="panel">
        <div class="target">ターゲット: <b>123456</b></div>
        <div id="result">初期化中...</div>
        <button id="btn" disabled>スキャン開始</button>
    </div>
<script>
    const video = document.getElementById('video');
    const resultDisplay = document.getElementById('result');
    const btn = document.getElementById('btn');
    const targetCode = "123456"; 

    // カメラを起動する関数
    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            // ビデオが再生可能になったらボタンを出す
            video.onloadeddata = () => {
                btn.disabled = false;
                resultDisplay.innerText = "準備完了：枠に合わせて押す";
            };
        } catch (e) {
            resultDisplay.innerText = "カメラ許可が必要です";
        }
    }

    // スキャンする関数
    async function doScan() {
        btn.disabled = true;
        resultDisplay.innerText = "読み取り中...";
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth * 0.5;
        canvas.height = video.videoHeight * 0.15;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, video.videoWidth*0.25, video.videoHeight*0.42, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

        try {
            const res = await Tesseract.recognize(canvas, 'eng');
            let txt = res.data.text.replace(/[Il|i]/g, '1').replace(/[^0-9]/g, '');
            
            if (txt.includes(targetCode)) {
                resultDisplay.innerText = "【一致】OK！";
                document.body.style.backgroundColor = "blue";
                if(navigator.vibrate) navigator.vibrate(200);
            } else {
                resultDisplay.innerText = "不一致: " + (txt || "読取不可");
                document.body.style.backgroundColor = "#330000";
            }
        } catch (e) {
            resultDisplay.innerText = "エラー再試行";
        } finally {
            setTimeout(() => { btn.disabled = false; }, 2000);
        }
    }

    // ボタンに機能を割り当てる
    btn.onclick = doScan;

    // 画面が開いたらカメラ起動
    start();
</script>
    
</body>
</html>

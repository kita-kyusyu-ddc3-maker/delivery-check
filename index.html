<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DDC Scanner v1.18</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{'display':'standalone','name':'DDC Scanner','orientation':'portrait'}">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%236c5ce7%22/><rect x=%2230%22 y=%2220%22 width=%2240%22 height=%2260%22 rx=%225%22 fill=%22none%22 stroke=%22white%22 stroke-width=%225%22/><circle cx=%2250%22 cy=%2272%22 r=%223%22 fill=%22white%22/><path d=%22M60 65 l15 15 l25 -30%22 stroke=%22%2300ff00%22 stroke-width=%2212%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%236c5ce7%22/><rect x=%2230%22 y=%2220%22 width=%2240%22 height=%2260%22 rx=%225%22 fill=%22none%22 stroke=%22white%22 stroke-width=%225%22/><circle cx=%2250%22 cy=%2272%22 r=%223%22 fill=%22white%22/><path d=%22M60 65 l15 15 l25 -30%22 stroke=%22%2300ff00%22 stroke-width=%2212%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f0f0f7;
            --purple-accent: #6c5ce7;
            --ok-blue: #3498db;
            --ng-red: #e74c3c;
            --shadow: 8px 8px 16px #d1d1d6, -8px -8px 16px #ffffff;
            --inner: inset 4px 4px 8px #d1d1d6, inset -4px -4px 8px #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; overscroll-behavior: none; }
        body { font-family: sans-serif; display: flex; flex-direction: column; }
        
        #orientation-warning { position: fixed; inset: 0; background: var(--purple-accent); color: white; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @media screen and (orientation: landscape) { #orientation-warning { display: flex; } }

        .top-id-bar { height: 70px; background: var(--purple-accent); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; flex-shrink: 0; }
        .settings-btn { background: none; border: none; color: white; font-size: 35px; padding: 10px; cursor: pointer; flex-shrink: 0; }
        .course-info-container { flex-grow: 1; display: flex; align-items: baseline; justify-content: center; overflow: hidden; }
        .course-title { font-size: 28px; letter-spacing: 1px; white-space: nowrap; }
        .version-label { font-size: 10px; opacity: 0.7; margin-left: 10px; font-weight: normal; }

        .header { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; text-align: center; }
        .line-name { font-size: 28px; font-weight: 900; color: #000; line-height: 1.1; height: 2.2em; display: flex; align-items: center; justify-content: center; width: 95%; overflow: hidden; }
        .line-code { font-size: 50px; color: var(--purple-accent); font-family: monospace; font-weight: 900; letter-spacing: 5px; }

        #scan-step-label { font-size: 18px; font-weight: bold; color: #666; margin-bottom: 5px; background: #e0e0eb; padding: 4px 20px; border-radius: 12px; border: 1px solid #ccc; }
        #cam-area { height: 25vh; width: 100%; padding: 0 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cam-frame { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; box-shadow: var(--inner); background: #000; position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .guide-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 80px; border: 4px solid var(--purple-accent); border-radius: 12px; z-index: 500; pointer-events: none; }
        .guide-rect.step2 { border-color: #ff9f43; }

        #symbol-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 240px; font-weight: bold; pointer-events: none; z-index: 5000; opacity: 0; text-shadow: 0 0 30px rgba(255,255,255,0.8); }
        @keyframes popStop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 85% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } }
        .animate-symbol { animation: popStop 1.3s ease-in-out forwards; }

        #setup-screen { position: fixed; inset: 0; background: #f0f0f7; z-index: 9000; display: none; flex-direction: column; padding: 20px; padding-top: 50px; }
        .setup-card { background: #fff; padding: 15px; border-radius: 20px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 15px; flex-shrink: 0; }
        .history-tabs { display: flex; justify-content: space-around; background: #ddd; border-radius: 15px 15px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #777; font-size: 13px; }
        .tab-btn.active { background: #fff; color: var(--purple-accent); border-bottom: 3px solid var(--purple-accent); }
        .list-container { flex-grow: 1; overflow-y: auto; background: #fff; border-radius: 0 0 20px 20px; box-shadow: var(--shadow); padding: 5px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; font-size: 17px; font-weight: bold; }
        .list-item.done { background: #f0fff4; color: #2ecc71; }

        #custom-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup-card { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .popup-content { margin: 20px 0; font-size: 17px; line-height: 1.5; white-space: pre-wrap; text-align: left; max-height: 250px; overflow-y: auto; }

        .footer { height: 32vh; display: flex; align-items: center; justify-content: space-evenly; padding: 0 10px 10px; flex-shrink: 0; }
        .btn-side { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--purple-accent); font-size: 40px; display: flex; align-items: center; justify-content: center; outline: none; }
        #scan-main { width: 145px; height: 145px; border-radius: 50%; border: none; background: #ccc; box-shadow: var(--shadow); color: #fff; font-size: 20px; font-weight: 900; outline: none; transition: 0.2s; }
        #scan-main.ready { background: var(--bg); color: var(--purple-accent); font-size: 24px; }
        #scan-main.active { background: var(--purple-accent); color: #fff; box-shadow: var(--inner); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="orientation-warning">
        <div style="font-size: 50px; margin-bottom: 20px;">📱</div>
        <p style="font-size: 20px; font-weight: bold;">DDC Scanner<br>端末を縦にしてください</p>
    </div>

    <div id="custom-popup">
        <div class="popup-card">
            <h3 id="popup-title">DETAILS</h3>
            <div id="popup-text" class="popup-content"></div>
            <button onclick="closePopup()" style="width:100%; padding:12px; background:var(--purple-accent); color:#fff; border:none; border-radius:10px;">CLOSE</button>
        </div>
    </div>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="margin-bottom:10px; text-align:center; font-size: 20px;">DDC 配送設定</h2>
            <select id="shift-in" onchange="updateCourseOptions();" style="width:100%; padding:12px; font-size:18px; margin-bottom:8px; border-radius:10px; border:1px solid #ccc;"><option value="1">1便</option><option value="2">2便</option><option value="3">3便</option></select>
            <select id="course-in" style="width:100%; padding:12px; font-size:18px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;"></select>
            <button onclick="applySettings();" style="width:100%; height:50px; background:var(--purple-accent); color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:bold;">設定を確定</button>
        </div>
        <div class="history-tabs">
            <button class="tab-btn active" id="tab-0" onclick="changeTab(0)">-</button>
            <button class="tab-btn" id="tab-1" onclick="changeTab(1)">-</button>
            <button class="tab-btn" id="tab-2" onclick="changeTab(2)">-</button>
        </div>
        <div class="list-container" id="history-container"><div class="delivery-list" id="delivery-list-ui"></div></div>
        <button onclick="document.getElementById('setup-screen').style.display='none'; playSound('tap');" style="margin-top:15px; width:100%; padding:15px; background:#666; color:#fff; border:none; border-radius:12px;">閉じる</button>
    </div>

    <div id="symbol-overlay"></div>
    <div class="top-id-bar">
        <button class="settings-btn" onclick="openSetup(); playSound('tap');">⚙</button>
        <div class="course-info-container">
            <div id="top-id-display" class="course-title">DDC SCANNER</div>
            <span class="version-label">v1.18</span>
        </div>
        <div style="width: 45px;"></div> </div>

    <div class="header">
        <div id="scan-step-label">STEP 1: 看板スキャン</div>
        <div id="name-label" class="line-name">LOADING...</div>
        <div id="code-label" class="line-code">000000</div>
    </div>

    <div id="cam-area"><div class="cam-frame"><video id="video" autoplay playsinline muted></video><div id="guide" class="guide-rect"></div></div></div>
    
    <div class="footer">
        <button class="btn-side" onclick="stepShop(-1); playSound('tap');">◀</button>
        <button id="scan-main" disabled onclick="toggleAutoScan()">待機中</button>
        <button class="btn-side" onclick="stepShop(1); playSound('tap');">▶</button>
    </div>

    <script>
        let db = {}; const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkGW07X71K4ABtBqX4HI4mbH4D9fChVkM8eoBVpvlyG5Ga_7a6vL6o6Q1zIOpJBFOZ-P--mBMbAvto/pub?gid=0&single=true&output=csv";
        let myCourse = localStorage.getItem('v41_course_id') || "";
        let idx = parseInt(localStorage.getItem('v118_idx')) || 0;
        let scanStep = parseInt(localStorage.getItem('v118_step')) || 1; 
        let historyData = JSON.parse(localStorage.getItem('v46_hist_v18') || '[]'); 
        let worker = null, isAutoScan = false, viewDayOffset = 0, audioCtx = null;

        function formatDateJP(timestamp) { const d = new Date(timestamp); return `${d.getMonth()+1}月${d.getDate()}日(${['日','月','火','水','木','金','土'][d.getDay()]})`; }
        function getCurrentCycle() { return historyData.length > 0 ? historyData[0] : null; }
        function ensureCycle() {
            let cycle = getCurrentCycle();
            if (!cycle || cycle.isFinalized) { cycle = { id: Date.now(), course: myCourse, shops: {}, completedCodes: [], isFinalized: false }; historyData.unshift(cycle); if(historyData.length > 3) historyData.pop(); saveHistory(); }
            return cycle;
        }
        function saveHistory() { localStorage.setItem('v46_hist_v18', JSON.stringify(historyData)); localStorage.setItem('v41_course_id', myCourse); localStorage.setItem('v118_idx', idx); localStorage.setItem('v118_step', scanStep); }

        function showPopup(title, text) { document.getElementById('popup-title').innerText = title; document.getElementById('popup-text').innerText = text; document.getElementById('custom-popup').style.display = "flex"; }
        function closePopup() { document.getElementById('custom-popup').style.display = "none"; }

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime; const masterGain = audioCtx.createGain(); masterGain.gain.setValueAtTime(1.0, now); masterGain.connect(audioCtx.destination);
            if (type === 'ok') { 
                const o1 = audioCtx.createOscillator(); const g1 = audioCtx.createGain(); o1.connect(g1); g1.connect(masterGain); o1.type = 'sine'; o1.frequency.setValueAtTime(659.25, now); g1.gain.setValueAtTime(0, now); g1.gain.linearRampToValueAtTime(0.8, now + 0.05); g1.gain.exponentialRampToValueAtTime(0.01, now + 0.4); o1.start(now); o1.stop(now + 0.4);
                const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain(); o2.connect(g2); g2.connect(masterGain); o2.type = 'sine'; o2.frequency.setValueAtTime(523.25, now + 0.12); g2.gain.setValueAtTime(0, now + 0.12); g2.gain.linearRampToValueAtTime(0.8, now + 0.17); g2.gain.exponentialRampToValueAtTime(0.01, now + 0.7); o2.start(now + 0.12); o2.stop(now + 0.7);
            } else if (type === 'ng') { 
                [140, 135, 145].forEach((freq, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(masterGain); o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, now + (i*0.02)); g.gain.setValueAtTime(0.4, now); g.gain.linearRampToValueAtTime(0, now + 0.5); o.start(now); o.stop(now + 0.5); });
            } else if (type === 'tap') {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(masterGain); o.type = 'sine'; o.frequency.setValueAtTime(1500, now); g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1); o.start(); o.stop(now + 0.1);
            }
        }

        async function loadDataFromSheet() {
            try { const response = await fetch(SHEET_URL); const csvData = await response.text(); const lines = csvData.split("\n"); db = {}; for (let i = 1; i < lines.length; i++) { const row = lines[i].split(","); if (row.length < 3) continue; const course = row[0].trim(); const name = row[1].trim(); const code = row[2].trim().replace(/"/g, "").replace(/\r/g, ""); if (!db[course]) db[course] = []; db[course].push({ n: name, c: code }); } if(!myCourse || !db[myCourse]) myCourse = Object.keys(db)[0]; updateCourseOptions(); ui(); if(!worker) initAI(); } catch (e) { document.getElementById('name-label').innerText = "通信エラー"; }
        }
        function updateCourseOptions() { const shift = document.getElementById('shift-in').value; const menu = document.getElementById('course-in'); menu.innerHTML = ""; const courses = Object.keys(db).sort().filter(c => c.startsWith(shift)); courses.forEach(c => { let o = document.createElement("option"); o.value = c; o.text = c + "コース"; menu.add(o); if(c == myCourse) o.selected = true; }); }
        function openSetup() { document.getElementById('setup-screen').style.display = "flex"; updateCourseOptions(); updateTabLabels(); changeTab(0); }
        function updateTabLabels() { for(let i=0; i<3; i++) { const btn = document.getElementById(`tab-${i}`); const entry = historyData[i]; btn.innerText = entry ? formatDateJP(entry.id) : "-/-"; } }
        function changeTab(day) { viewDayOffset = day; document.querySelectorAll('.tab-btn').forEach((b, i) => { b.classList.toggle('active', i === day); }); renderList(); }
        function applySettings() { myCourse = document.getElementById('course-in').value; playSound('tap'); document.getElementById('setup-screen').style.display = 'none'; idx = 0; scanStep = 1; saveHistory(); ui(); }
        async function initAI() { const btn = document.getElementById('scan-main'); worker = await Tesseract.createWorker(); await worker.loadLanguage('eng'); await worker.initialize('eng'); await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' }); btn.disabled = false; btn.innerText = "AUTO SCAN"; btn.classList.add('ready'); }
        
        function renderList() { 
            const listUi = document.getElementById('delivery-list-ui'); listUi.innerHTML = ""; 
            const entry = historyData[viewDayOffset]; if(!entry) return; 
            const shops = db[entry.course] || []; 
            shops.forEach((s, i) => { 
                const myShopHist = entry.shops[s.c] || []; const isFinalized = entry.completedCodes.includes(s.c); 
                const div = document.createElement('div'); div.className = `list-item ${isFinalized ? 'done' : ''}`; 
                div.innerHTML = `<span>${isFinalized ? '✔' : '-'} ${i+1}. ${s.n}</span><span style='font-size:15px; color:#666;'>${myShopHist.length > 0 ? myShopHist.length + '台' : '-'}</span>`; 
                div.onclick = () => { if(myShopHist.length > 0) showPopup(s.n, `納品日: ${formatDateJP(entry.id)}\n履歴:\n` + myShopHist.map(h => `・${h.time}`).join("\n")); }; 
                listUi.appendChild(div); 
            }); 
        }

        function ui() { if(!db[myCourse]) return; const item = db[myCourse][idx]; document.getElementById('top-id-display').innerText = `${myCourse} - ${String(idx + 1).padStart(2, '0')}`; document.getElementById('code-label').innerText = item.c; document.getElementById('name-label').innerText = item.n; updateStepLabel(); }
        function updateStepLabel() { const label = document.getElementById('scan-step-label'); const guide = document.getElementById('guide'); if(scanStep === 1) { label.innerText = "STEP 1: 看板スキャン"; label.style.color = "var(--purple-accent)"; guide.classList.remove('step2'); } else { label.innerText = "STEP 2: シールスキャン"; label.style.color = "#ff9f43"; guide.classList.add('step2'); } }
        
        function stepShop(d) { 
            const list = db[myCourse]; const cycle = ensureCycle(); 
            const currentShift = myCourse.substring(0,1); 
            const courseCore = myCourse.substring(1); 
            const isSpecial3ShiftCourse = ["14", "04", "01"].includes(courseCore);

            if(d === 1) { 
                const shopCode = list[idx].c; 
                if(cycle.shops[shopCode]?.length > 0 && !cycle.completedCodes.includes(shopCode)) cycle.completedCodes.push(shopCode);
                
                if(idx === list.length - 1) { 
                    const isFinalShift = (isSpecial3ShiftCourse && currentShift === "3") || (!isSpecial3ShiftCourse && currentShift === "2");
                    if(isFinalShift) {
                        cycle.isFinalized = true; 
                        showPopup("全行程終了", "全行程終了：本日の記録を確定しました。お疲れ様でした。");
                    } else {
                        showPopup(`${currentShift}便 完了`, `${currentShift}便の配送を完了しました。次の便の設定を行ってください。`);
                    }
                } 
            } 
            idx = Math.max(0, Math.min(list.length - 1, idx + d)); scanStep = 1; saveHistory(); ui(); 
        }
        
        function toggleAutoScan() { isAutoScan = !isAutoScan; const btn = document.getElementById('scan-main'); if(isAutoScan) { playSound('tap'); btn.innerText = "STOP"; btn.classList.add('active'); runScannerLoop(); } else { playSound('tap'); btn.innerText = "AUTO SCAN"; btn.classList.remove('active'); } }
        async function runScannerLoop() { if(!isAutoScan) return; const v = document.getElementById('video'); const canvas = document.createElement('canvas'); const scale = v.videoWidth / v.clientWidth; canvas.width = 180; canvas.height = 80; const sx = (v.videoWidth - 180 * scale) / 2; const sy = (v.videoHeight - 80 * scale) / 2; const ctx = canvas.getContext('2d'); ctx.drawImage(v, sx, sy, 180 * scale, 80 * scale, 0, 0, 180, 80); let imageData = ctx.getImageData(0,0,180,80); for(let i=0; i<imageData.data.length; i+=4) { let g = imageData.data[i]*0.3 + imageData.data[i+1]*0.59 + imageData.data[i+2]*0.11; imageData.data[i] = imageData.data[i+1] = imageData.data[i+2] = g > 125 ? 255 : 0; } ctx.putImageData(imageData, 0, 0); try { const res = await worker.recognize(canvas); const txt = res.data.text.replace(/[^0-9]/g, ''); if(txt.length >= 6) checkMatch(txt); } catch(e) {} if (isAutoScan) setTimeout(runScannerLoop, 300); }
        function checkMatch(input) { const now = Date.now(); if(now - lastCheckTime < 1800) return; const targetCode = db[myCourse][idx].c; if(!input.includes(targetCode)) { if(input.length === 6) { lastCheckTime = now; showVisual(false); playSound('ng'); if(navigator.vibrate) navigator.vibrate(400); } return; } lastCheckTime = now; ensureCycle(); if(scanStep === 1) { scanStep = 2; playSound('ok'); if(navigator.vibrate) navigator.vibrate(100); updateStepLabel(); saveHistory(); } else { saveRecord(targetCode); showVisual(true); playSound('ok'); scanStep = 1; updateStepLabel(); if(navigator.vibrate) navigator.vibrate([100, 50, 100]); toggleAutoScan(); saveHistory(); } }
        let lastCheckTime = 0;
        function saveRecord(code) { const cycle = ensureCycle(); const timeStr = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}); if(!cycle.shops[code]) cycle.shops[code] = []; cycle.shops[code].push({ time: timeStr }); saveHistory(); ui(); }
        function showVisual(isOk) { const overlay = document.getElementById('symbol-overlay'); overlay.innerText = isOk ? "○" : "×"; overlay.style.color = isOk ? "var(--ok-blue)" : "var(--ng-red)"; overlay.classList.remove('animate-symbol'); void overlay.offsetWidth; overlay.classList.add('animate-symbol'); }
        async function cam() { const v = document.getElementById('video'); try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } }); v.srcObject = s; if (screen.orientation && screen.orientation.lock) { try { await screen.orientation.lock('portrait'); } catch(e) {} } } catch(e) { alert("カメラ起動失敗。"); } }
        window.onload = () => { loadDataFromSheet(); cam(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤配防止OCR v8</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        /* 全体設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            overflow: hidden; touch-action: manipulation;
        }

        /* 横向きになった時に警告を出す、またはレイアウトを維持する設定 */
        @media screen and (orientation: landscape) {
            body::after {
                content: "画面を縦向きにして使用してください";
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: #000; color: #fff; display: flex; align-items: center;
                justify-content: center; z-index: 9999; font-size: 20px;
            }
        }
        
        /* カメラエリア（上部固定） */
        #v-container { 
            position: relative; width: 100%; height: 65vh; 
            background: #222; overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ガイド枠 */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.4); 
        }
        .guide-box { 
            width: 280px; height: 80px; 
            border: 2px solid rgba(255,255,255,0.3); 
            position: relative;
        }
        .guide-box::before { content: ""; position: absolute; top: -5px; left: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-right: 0; border-bottom: 0; }
        .guide-box::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 30px; height: 30px; border: 5px solid #00ff00; border-left: 0; border-top: 0; }

        /* 操作パネル（下部固定） */
        .panel { 
            height: 35vh; background: #111; border-top: 3px solid #333; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneのバー対策 */
        }
        .target { font-size: 14px; color: #aaa; }
        .target b { color: #00ff00; font-size: 28px; letter-spacing: 2px; }
        #result { font-size: 18px; font-weight: bold; color: #ffff00; text-align: center; height: 1.5em; }
        
        /* スキャンボタン（大きく押しやすく） */
        #btn { 
            width: 85%; height: 70px; 
            background: #0088ff; color: #fff; 
            border: none; border-radius: 16px; 
            font-size: 24px; font-weight: bold;
            box-shadow: 0 5px 0 #0055aa;
        }
        #btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0055aa; }
        #btn:disabled { background: #444; color: #888; box-shadow: none; }
    </style>
</head>
<body>

    <div id="v-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay"><div class="guide-box"></div></div>
    </div>
    
    <div class="panel">
        <div class="target">ターゲット: <b>123456</b></div>
        <div id="result">初期化中...</div>
        <button id="btn" disabled>スキャン開始</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result');
        const btn = document.getElementById('btn');
        const targetCode = "123456"; 

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = s;
                video.onloadeddata = () => {
                    btn.disabled = false;
                    resultDisplay.innerText = "枠に数字を合わせてスキャン";
                };
            } catch (e) {
                resultDisplay.innerText = "カメラ許可が必要です";
            }
        }

        async function doScan() {
            btn.disabled = true;
            resultDisplay.innerText = "読み取り中...";
            document.body.style.backgroundColor = "black";

            const canvas = document.createElement('canvas');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            const sW = vW * 0.6; 
            const sH = vH * 0.15; 
            const sX = (vW - sW) / 2;
            const sY = (vH - sH) / 2;

            canvas.width = sW;
            canvas.height = sH;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, sX, sY, sW, sH, 0, 0, sW, sH);

            try {
                const res = await Tesseract.recognize(canvas, 'eng');
                let raw = res.data.text;
                let clean = raw.replace(/[Il|i]/g, '1').replace(/[^0-9]/g, '');

                if (clean.includes(targetCode)) {
                    resultDisplay.innerText = "【一致】荷下ろしOK！";
                    resultDisplay.style.color = "#00ffff";
                    document.body.style.backgroundColor = "blue";
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    resultDisplay.innerText = "不一致: " + (clean || "読取不可");
                    resultDisplay.style.color = "#ff4444";
                    document.body.style.backgroundColor = "#330000";
                    if (navigator.vibrate) navigator.vibrate(400);
                }
            } catch (e) {
                resultDisplay.innerText = "エラー：再試行してください";
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    if (document.body.style.backgroundColor !== "blue") {
                        resultDisplay.style.color = "#ffff00";
                        resultDisplay.innerText = "スキャン待機中";
                    }
                }, 2000);
            }
        }

        btn.onclick = doScan;
        window.onload = init;
    </script>
</body>
</html>
